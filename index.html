<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#111">
<title>LIFT</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111;--s1:#1c1c1c;--s2:#252525;--s3:#2e2e2e;
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.14);--b3:rgba(255,255,255,.28);
  --t1:#f0ede8;--t2:#999;--t3:#555;
  --ac:#c5f135;--ac2:rgba(197,241,53,.14);
  --d1:#5bb8f5;--d1b:rgba(91,184,245,.13);
  --d2:#f56b8b;--d2b:rgba(245,107,139,.13);
  --d3:#f5b535;--d3b:rgba(245,181,53,.13);
  --r:10px;--mono:'DM Mono',monospace;--sans:'Syne',sans-serif;
}
html,body{background:var(--bg);color:var(--t1);font-family:var(--mono);min-height:100vh;-webkit-font-smoothing:antialiased;font-size:14px}
.app{max-width:480px;margin:0 auto;padding:0 12px 100px}

/* AUTH */
#auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:32px}
.auth-logo{font-family:var(--sans);font-size:48px;font-weight:700;letter-spacing:-2px;margin-bottom:6px}
.auth-logo span{color:var(--ac)}
.auth-sub{font-size:13px;color:var(--t3);margin-bottom:48px}
.auth-btn{display:flex;align-items:center;gap:12px;padding:14px 28px;background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);cursor:pointer;font-family:var(--mono);font-size:14px;color:var(--t1);transition:border-color .15s}
.auth-btn:hover{border-color:var(--b3)}
.auth-btn svg{width:20px;height:20px;flex-shrink:0}
.auth-note{font-size:11px;color:var(--t3);margin-top:20px;max-width:280px;line-height:1.7}

/* SYNC */
.sync-bar{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t3);margin-bottom:12px;min-height:18px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--t3);flex-shrink:0}
.sync-dot.ok{background:#5bf5a0}.sync-dot.err{background:#f56b8b}.sync-dot.busy{background:var(--ac);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* NAV */
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--s1);border-top:1px solid var(--b2);display:flex;z-index:99;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:14px 0 10px;border:none;background:none;color:var(--t3);font-family:var(--mono);font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .15s}
.nav-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.active{color:var(--ac)}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:18px 0 10px}
.logo{font-family:var(--sans);font-size:20px;font-weight:700;letter-spacing:-1px}
.logo span{color:var(--ac)}
.hdr-r{display:flex;align-items:center;gap:8px}
.badge{font-size:11px;color:var(--t3);background:var(--s1);border:1px solid var(--b1);padding:3px 10px;border-radius:20px}
.signout-btn{background:none;border:none;color:var(--t3);font-size:11px;cursor:pointer;font-family:var(--mono)}
.signout-btn:hover{color:var(--t2)}

/* DAY PILLS */
.day-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.day-pill{padding:12px 6px;border:1px solid var(--b1);background:var(--s1);border-radius:var(--r);cursor:pointer;text-align:center;transition:all .15s;user-select:none}
.day-pill .dl{font-family:var(--sans);font-size:17px;font-weight:700;display:block;margin-bottom:1px}
.day-pill .ds{font-size:10px;color:var(--t3)}
.day-pill.on-d1{background:var(--d1b);border-color:var(--d1)}.day-pill.on-d1 .dl{color:var(--d1)}
.day-pill.on-d2{background:var(--d2b);border-color:var(--d2)}.day-pill.on-d2 .dl{color:var(--d2)}
.day-pill.on-d3{background:var(--d3b);border-color:var(--d3)}.day-pill.on-d3 .dl{color:var(--d3)}

/* EXERCISE CARD */
.ex-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.ex-card.open{border-color:var(--b2)}
.ex-card.saved{border-color:rgba(197,241,53,.4)}
.ex-hd{display:flex;align-items:center;justify-content:space-between;padding:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.ex-left{flex:1;min-width:0}
.ex-nm{font-family:var(--sans);font-size:14px;font-weight:700;color:var(--t1);margin-bottom:3px}
.ex-pr{font-size:11px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-right{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:8px}
.saved-badge{font-size:10px;color:var(--ac);background:var(--ac2);padding:2px 8px;border-radius:20px;white-space:nowrap}
.ch{color:var(--t3);font-size:11px;transition:transform .2s;display:inline-block}
.ex-card.open .ch{transform:rotate(90deg)}
.ex-bd{display:none;border-top:1px solid var(--b1);padding:14px}
.ex-card.open .ex-bd{display:block}

/* SETS */
.sets-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.sets-g{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.set-wrap{display:flex;flex-direction:column;gap:3px}
.set-n{font-size:10px;color:var(--t3);text-align:center}
.set-in{width:100%;padding:11px 4px;text-align:center;font-family:var(--mono);font-size:14px;font-weight:500;background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--t1);transition:border-color .15s;}
.set-in:focus{outline:none;border-color:var(--b3);background:var(--s3)}
.set-in.filled{border-color:rgba(255,255,255,.25)}
.set-note{width:100%;margin-bottom:10px;padding:8px 10px;font-family:var(--mono);font-size:12px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--t2);resize:none}
.set-note:focus{outline:none;border-color:var(--b2)}
.btn-row{display:flex;gap:8px}
.save-btn{flex:1;padding:12px;border:none;background:var(--ac);color:#111;font-family:var(--sans);font-size:13px;font-weight:700;border-radius:8px;cursor:pointer;transition:opacity .15s}
.save-btn:active{opacity:.8}
.save-btn:disabled{opacity:.4;cursor:not-allowed}
.tmpl-banner{font-size:11px;color:var(--t3);margin-bottom:10px;padding:7px 10px;background:var(--s2);border-radius:6px;border:1px solid var(--b1);line-height:1.5}
.tmpl-banner b{color:var(--t2)}

/* HISTORY */
.hist-sec{margin-top:12px;border-top:1px solid var(--b1);padding-top:10px}
.hist-ttl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.hist-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.hist-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--t3)}
.hist-date{font-size:10px;color:var(--t3);width:58px;flex-shrink:0}
.hist-raw{font-size:11px;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ADD EXERCISE */
.add-ex-btn{width:100%;padding:12px;border:1px dashed var(--b2);background:none;color:var(--t3);font-family:var(--mono);font-size:13px;border-radius:var(--r);cursor:pointer;margin-top:4px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.add-ex-btn:hover{border-color:var(--b3);color:var(--t2)}
/* BINARY BUTTONS */
.bin-btn{flex:1;padding:12px;border:1px solid var(--b2);background:var(--s2);color:var(--t2);font-family:var(--mono);font-size:14px;border-radius:8px;cursor:pointer;transition:all .15s}
.bin-btn.bin-on{background:var(--ac2);border-color:var(--ac);color:var(--ac);font-weight:700}
/* SET CONTROL */
.set-ctrl-btn{padding:6px 14px;border:1px solid var(--b2);background:none;color:var(--t3);font-family:var(--mono);font-size:12px;border-radius:6px;cursor:pointer;transition:all .15s}
.set-ctrl-btn:hover{border-color:var(--b3);color:var(--t2)}

/* ADD SHEET (bottom sheet) */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:150;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--s1);width:100%;max-width:480px;border-radius:16px 16px 0 0;padding:20px 16px 40px;max-height:80vh;overflow-y:auto}
.sheet-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sheet-ttl{font-family:var(--sans);font-size:16px;font-weight:700}
.close-btn{background:none;border:none;color:var(--t2);cursor:pointer;font-size:24px;line-height:1}
.sheet-section{margin-bottom:16px}
.sheet-sec-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.sheet-ex-item{padding:11px 14px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;margin-bottom:6px;cursor:pointer;font-size:13px;color:var(--t1);transition:border-color .15s;display:flex;align-items:center;justify-content:space-between}
.sheet-ex-item:hover{border-color:var(--b2)}
.sheet-ex-day{font-size:10px;padding:2px 7px;border-radius:20px}
.sheet-ex-day.d1{background:var(--d1b);color:var(--d1)}
.sheet-ex-day.d2{background:var(--d2b);color:var(--d2)}
.sheet-ex-day.d3{background:var(--d3b);color:var(--d3)}
.new-ex-row{display:flex;gap:8px}
.new-ex-in{flex:1;padding:10px 12px;font-family:var(--mono);font-size:13px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--t1)}
.new-ex-in:focus{outline:none;border-color:var(--b2)}
.new-ex-add{padding:10px 16px;border:none;background:var(--ac);color:#111;font-family:var(--sans);font-size:13px;font-weight:700;border-radius:8px;cursor:pointer;white-space:nowrap}
.sheet-search{width:100%;padding:9px 12px;font-family:var(--mono);font-size:13px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--t1);margin-bottom:10px}
.sheet-search:focus{outline:none;border-color:var(--b2)}

/* SESSIONS VIEW */
.sec-title{font-family:var(--sans);font-size:16px;font-weight:700;margin-bottom:14px}
.sess-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:8px;padding:13px 14px;cursor:pointer;transition:border-color .15s}
.sess-card:hover{border-color:var(--b2)}
.sess-top{display:flex;align-items:center;justify-content:space-between}
.sess-name{font-family:var(--sans);font-size:14px;font-weight:700}
.sess-meta{font-size:11px;color:var(--t3);margin-top:3px}
.sess-tag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700}
.sess-tag.d1{background:var(--d1b);color:var(--d1)}.sess-tag.d2{background:var(--d2b);color:var(--d2)}.sess-tag.d3{background:var(--d3b);color:var(--d3)}
.empty-state{text-align:center;padding:40px 0;color:var(--t3);font-size:13px;line-height:1.9}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--s1);width:100%;max-width:480px;border-radius:16px 16px 0 0;max-height:85vh;overflow-y:auto;padding:20px 16px 40px}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-ttl{font-family:var(--sans);font-size:17px;font-weight:700}
.modal-ex-row{border-bottom:1px solid var(--b1);padding:10px 0}
.modal-ex-nm{font-size:12px;color:var(--t2);margin-bottom:3px}
.modal-ex-sets{font-size:14px;color:var(--t1)}
.modal-ex-note{font-size:11px;color:var(--t3);margin-top:2px}
.load-btn{width:100%;margin-top:16px;padding:12px;border:1px solid var(--ac);background:var(--ac2);color:var(--ac);font-family:var(--sans);font-size:14px;font-weight:700;border-radius:8px;cursor:pointer}
.del-ex-btn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:15px;padding:4px;flex-shrink:0;line-height:1;margin-top:2px}
.del-ex-btn:hover{color:#f56b8b}

/* GRAPH */
.search-in{width:100%;padding:10px 14px;font-family:var(--mono);font-size:13px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);color:var(--t1);margin-bottom:12px}
.search-in:focus{outline:none;border-color:var(--b2)}
.graph-ex-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.graph-ex-item:hover{border-color:var(--b2)}
.graph-ex-nm{font-family:var(--sans);font-size:14px;font-weight:700}
.graph-day-tag{font-size:10px;padding:2px 8px;border-radius:20px;margin-top:3px;display:inline-block}
.graph-day-tag.d1{background:var(--d1b);color:var(--d1)}.graph-day-tag.d2{background:var(--d2b);color:var(--d2)}.graph-day-tag.d3{background:var(--d3b);color:var(--d3)}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--t2);font-family:var(--mono);font-size:13px;cursor:pointer;padding:0;margin-bottom:14px}
.chart-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:16px;margin-bottom:12px}
.chart-ttl{font-family:var(--sans);font-size:16px;font-weight:700;margin-bottom:2px}
.chart-sub{font-size:11px;color:var(--t3);margin-bottom:14px}
.chart-wrap{position:relative;height:200px}
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-top:12px}
.stat-box{background:var(--s2);border-radius:8px;padding:10px;text-align:center}
.stat-val{font-family:var(--sans);font-size:16px;font-weight:700}
.stat-lbl{font-size:10px;color:var(--t3);margin-top:2px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--b2);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>
<body>

<!-- AUTH -->
<div id="auth-screen">
  <div class="auth-logo">LIFT<span>.</span></div>
  <div class="auth-sub">your workout tracker</div>
  <button class="auth-btn" id="auth-btn">
    <svg viewBox="0 0 24 24" fill="none"><path d="M22.56 12.25c0-.78-.07-1.53-.2-2.25H12v4.26h5.92c-.26 1.37-1.04 2.53-2.21 3.31v2.77h3.57c2.08-1.92 3.28-4.74 3.28-8.09z" fill="#4285F4"/><path d="M12 23c2.97 0 5.46-.98 7.28-2.66l-3.57-2.77c-.98.66-2.23 1.06-3.71 1.06-2.86 0-5.29-1.93-6.16-4.53H2.18v2.84C3.99 20.53 7.7 23 12 23z" fill="#34A853"/><path d="M5.84 14.09c-.22-.66-.35-1.36-.35-2.09s.13-1.43.35-2.09V7.07H2.18C1.43 8.55 1 10.22 1 12s.43 3.45 1.18 4.93l3.66-2.84z" fill="#FBBC05"/><path d="M12 5.38c1.62 0 3.06.56 4.21 1.64l3.15-3.15C17.45 2.09 14.97 1 12 1 7.7 1 3.99 3.47 2.18 7.07l3.66 2.84c.87-2.6 3.3-4.53 6.16-4.53z" fill="#EA4335"/></svg>
    Sign in with Google
  </button>
  <div class="auth-note">Your data stays in your own private Google Sheet. This app never stores your credentials.</div>
</div>

<!-- MAIN APP -->
<div id="main-app" style="display:none">
  <div class="app">
    <header>
      <div class="logo">LIFT<span>.</span></div>
      <div class="hdr-r">
        <div class="badge" id="hdr-date"></div>
        <button class="signout-btn" onclick="signOut()">sign out</button>
      </div>
    </header>
    <div class="sync-bar"><div class="sync-dot busy" id="sync-dot"></div><span id="sync-msg">Connecting…</span></div>

    <div id="view-log">
      <div class="day-row">
        <div class="day-pill" id="pill-d1" onclick="selDay('d1')"><span class="dl">D1</span><span class="ds">Tuesday</span></div>
        <div class="day-pill" id="pill-d2" onclick="selDay('d2')"><span class="dl">D2</span><span class="ds">Thursday</span></div>
        <div class="day-pill" id="pill-d3" onclick="selDay('d3')"><span class="dl">D3</span><span class="ds">Saturday</span></div>
      </div>
      <div id="ex-list"></div>
    </div>

    <div id="view-sessions" style="display:none">
      <div class="sec-title">Past sessions</div>
      <div id="sess-list"></div>
    </div>

    <div id="view-graph" style="display:none">
      <div id="graph-list-view">
        <input class="search-in" id="graph-search" placeholder="Search exercise…" oninput="filterGraphList()">
        <div id="graph-ex-list"></div>
      </div>
      <div id="graph-detail" style="display:none">
        <button class="back-btn" onclick="backToGraphList()">← All exercises</button>
        <div class="chart-card">
          <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:2px">
            <div class="chart-ttl" id="gd-name"></div>
            <button onclick="refreshData()" style="background:none;border:1px solid var(--b2);color:var(--t3);font-family:var(--mono);font-size:11px;padding:4px 10px;border-radius:6px;cursor:pointer">↻ Refresh</button>
          </div>
          <div class="chart-sub" id="gd-sub"></div>
          <div class="chart-wrap"><canvas id="main-chart"></canvas></div>
          <div class="stat-row">
            <div class="stat-box"><div class="stat-val" id="st-max">—</div><div class="stat-lbl">Max kg</div></div>
            <div class="stat-box"><div class="stat-val" id="st-min">—</div><div class="stat-lbl">Min kg</div></div>
            <div class="stat-box"><div class="stat-val" id="st-sess">—</div><div class="stat-lbl">Sessions</div></div>
            <div class="stat-box"><div class="stat-val" id="st-prog">—</div><div class="stat-lbl">Progress</div></div>
          </div>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- ADD EXERCISE SHEET -->
<div class="sheet-overlay" id="add-sheet" style="display:none" onclick="closeAddSheet(event)">
  <div class="sheet">
    <div class="sheet-hd">
      <div class="sheet-ttl">Add exercise</div>
      <button class="close-btn" onclick="hideAddSheet()">×</button>
    </div>
    <div class="sheet-section">
      <div class="sheet-sec-lbl">New exercise</div>
      <div class="new-ex-row">
        <input class="new-ex-in" id="new-ex-name" placeholder="Exercise name…">
        <button class="new-ex-add" onclick="addNewExercise()">Add</button>
      </div>
    </div>
    <div class="sheet-section">
      <div class="sheet-sec-lbl">From other days</div>
      <input class="sheet-search" id="sheet-search" placeholder="Filter…" oninput="filterSheetList()">
      <div id="sheet-ex-list"></div>
    </div>
  </div>
</div>

<!-- SESSION MODAL -->
<div class="modal-overlay" id="modal" style="display:none" onclick="closeModalOutside(event)">
  <div class="modal">
    <div class="modal-hd">
      <div class="modal-ttl" id="modal-ttl"></div>
      <button class="close-btn" onclick="hideModal()">×</button>
    </div>
    <div id="modal-body"></div>
    <button class="load-btn" onclick="loadAsTemplate()">Use as template ↗</button>
  </div>
</div>

<nav id="main-nav" style="display:none">
  <button class="nav-btn active" id="nb-log" onclick="switchView('log')">
    <svg viewBox="0 0 24 24"><path d="M11 4H4a2 2 0 0 0-2 2v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2v-7"/><path d="M18.5 2.5a2.121 2.121 0 0 1 3 3L12 15l-4 1 1-4 9.5-9.5z"/></svg>
    Log
  </button>
  <button class="nav-btn" id="nb-sessions" onclick="switchView('sessions')">
    <svg viewBox="0 0 24 24"><rect x="3" y="4" width="18" height="18" rx="2"/><line x1="16" y1="2" x2="16" y2="6"/><line x1="8" y1="2" x2="8" y2="6"/><line x1="3" y1="10" x2="21" y2="10"/></svg>
    Sessions

<script src="https://accounts.google.com/gsi/client" async defer></script>
<script>
const CLIENT_ID = '281076985814-vq0vfa3jces2jlttd236jofhn9jo7v42.apps.googleusercontent.com';
const SHEET_ID  = '1nddYAEfDluokRhQIt1LE372ZTBnEt72oPk6OIzz_7CU';
const SCOPES    = 'https://www.googleapis.com/auth/spreadsheets';
const API       = 'https://sheets.googleapis.com/v4/spreadsheets';

let token       = null;
let histData    = {d1:{}, d2:{}, d3:{}};
let sessionRows = [];
let curDay      = (()=>{const d=new Date().getDay();return d===2?'d1':d===4?'d2':d===6?'d3':'d1';})();
let curView     = 'log';
let chartInst   = null;
let modalSess   = null;
let template    = null;
// Per-exercise state for today: {name: {s1,s2,s3,note,saved}}
let exState     = {};
// Extra exercises added during session: {d1:[],d2:[],d3:[]}
let extraEx     = {d1:[],d2:[],d3:[]};
// Currently open card name
let openCard    = null;

// ── AUTH ──────────────────────────────────────────────────────────────────────
function initAuth() {
  document.getElementById('auth-btn').onclick = signIn;
}

function signIn() {
  const client = google.accounts.oauth2.initTokenClient({
    client_id: CLIENT_ID, scope: SCOPES,
    callback: async (resp) => {
      if (resp.error) { setSyncErr('Auth error'); return; }
      token = resp.access_token;
      localStorage.setItem('lift_exp', Date.now() + (resp.expires_in-60)*1000);
      showApp(); await loadAll();
    }
  });
  client.requestAccessToken();
}

function signOut() {
  if (token) google.accounts.oauth2.revoke(token, ()=>{});
  token = null; localStorage.removeItem('lift_exp');
  document.getElementById('auth-screen').style.display = 'flex';
  document.getElementById('main-app').style.display    = 'none';
  document.getElementById('main-nav').style.display    = 'none';
}

function showApp() {

  document.getElementById('main-app').style.display    = 'block';
  document.getElementById('main-nav').style.display    = 'flex';
  document.getElementById('hdr-date').textContent =
    new Date().toLocaleDateString('fr-FR',{weekday:'short',day:'numeric',month:'short'});
}

// silent re-auth on load
window.addEventListener('load', () => {
  initAuth();
  const exp = localStorage.getItem('lift_exp');
  if (!exp || Date.now() >= Number(exp)) return;
  setTimeout(() => {
    try {
      google.accounts.oauth2.initTokenClient({
        client_id: CLIENT_ID, scope: SCOPES, prompt:'',
        callback: async (resp) => {
          if (resp.error) return;
          token = resp.access_token;
          localStorage.setItem('lift_exp', Date.now() + (resp.expires_in-60)*1000);
          showApp(); await loadAll();
        }
      }).requestAccessToken();
    } catch(e) {}
  }, 600);
});

// ── SHEETS ────────────────────────────────────────────────────────────────────
async function apiGet(range) {
  const r = await fetch(`${API}/${SHEET_ID}/values/${encodeURIComponent(range)}`,
    {headers:{Authorization:'Bearer '+token}});
  if (!r.ok) throw new Error(r.status);
  return (await r.json()).values || [];
}

async function apiAppend(range, values) {
  const r = await fetch(
    `${API}/${SHEET_ID}/values/${encodeURIComponent(range)}:append?valueInputOption=RAW&insertDataOption=INSERT_ROWS`,
    {method:'POST', headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
     body: JSON.stringify({values})});
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

async function apiUpdate(range, values) {
  const r = await fetch(
    `${API}/${SHEET_ID}/values/${encodeURIComponent(range)}?valueInputOption=RAW`,
    {method:'PUT', headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
     body: JSON.stringify({range, values})});
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

async function apiClearRow(rowIndex) {
  // rowIndex is 0-based index in sessionRows → sheet row = rowIndex + 2 (header + 1-based)
  const sheetRow = rowIndex + 2;
  const range = `sessions!A${sheetRow}:M${sheetRow}`;
  const r = await fetch(
    `${API}/${SHEET_ID}/values/${encodeURIComponent(range)}:clear`,
    {method:'POST', headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'}});
  if (!r.ok) throw new Error(r.status);
  return r.json();
}

// ── SYNC STATUS ───────────────────────────────────────────────────────────────
function setSyncOk(m)   { _sync('ok',  m) }
function setSyncErr(m)  { _sync('err', m) }
function setSyncBusy(m) { _sync('busy',m) }
function _sync(s,m) {
  document.getElementById('sync-dot').className = 'sync-dot '+s;
  document.getElementById('sync-msg').textContent = m;
}

// ── EXERCISE CONFIG ───────────────────────────────────────────────────────────
// Special exercise configs: defaultSets count, binary (yes/no instead of kg)
const EX_CONFIG = {
  'hip raise':     { defaultSets: 4 },
  'hip raise(8x4)':{ defaultSets: 4 },
  'ab finisher':   { binary: true },
};
function exConfig(name) {
  return EX_CONFIG[name.toLowerCase().trim()] || {};
}
function defaultSetCount(name) { return exConfig(name).defaultSets || 3; }
function isBinary(name)        { return !!exConfig(name).binary; }

// ── LOAD ──────────────────────────────────────────────────────────────────────
async function loadAll() {
  setSyncBusy('Loading…');
  try {
    const [r1,r2,r3,rs] = await Promise.all([
      apiGet('d1_history!A:C'), apiGet('d2_history!A:C'),
      apiGet('d3_history!A:C'), apiGet('sessions!A:M')  // A-M = up to 8 sets + note
    ]);
    histData = { d1: parseHist(r1), d2: parseHist(r2), d3: parseHist(r3) };
    sessionRows = rs.slice(1).filter(r => r && r[0] && r[3]); // skip empty/cleared rows
    restoreTodayState();
    setSyncOk('Synced');
    selDay(curDay);
    if (curView==='sessions') renderSessions();
    if (curView==='graph')    renderGraphList();
  } catch(e) { setSyncErr('Error: '+e.message); }
}

// Extract sets array from a session row (cols 4..N-1, last col is note)
function rowSets(r) {
  const extra = r.slice(4);
  // Last non-empty string-like value is note; everything before is sets
  let noteIdx = -1;
  for (let i = extra.length-1; i >= 0; i--) {
    const v = (extra[i]||'').trim();
    if (!v) continue;
    if (/^[\d\s\.\-\(\)at+x]+$/i.test(v)) break; // looks like a set value
    noteIdx = i; break;
  }
  return (noteIdx>=0 ? extra.slice(0,noteIdx) : extra).map(v=>(v||'').trim()).filter(v=>v!=='');
}

function rowNote(r) {
  const extra = r.slice(4);
  for (let i = extra.length-1; i >= 0; i--) {
    const v = (extra[i]||'').trim();
    if (!v) continue;
    if (!/^[\d\s\.\-\(\)at+x]+$/i.test(v)) return v;
    break;
  }
  return '';
}

function rowToState(r) {
  return { sets: rowSets(r), note: rowNote(r), saved: true };
}

function restoreTodayState() {
  const today = new Date().toISOString().slice(0,10);
  sessionRows.forEach(r => {
    if (r[1] !== today) return;
    const name = r[3]; if (!name) return;
    if (exState[name]) return; // don't overwrite live edits
    const state = rowToState(r);
    exState[name] = state;
  });
}

function parseHist(rows) {
  const m = {};
  rows.slice(1).forEach(r => {
    if (!r[0]||!r[1]||!r[2]) return;
    const n = r[0].trim();
    if (!m[n]) m[n] = [];
    m[n].push({date:r[1], raw:r[2]});
  });
  Object.keys(m).forEach(k => m[k].sort((a,b)=>a.date.localeCompare(b.date)));
  return m;
}

// ── LOG VIEW ──────────────────────────────────────────────────────────────────
function todayDefaultDay() {
  const dow = new Date().getDay(); // 0=Sun,1=Mon,2=Tue,3=Wed,4=Thu,5=Fri,6=Sat
  if (dow === 2) return 'd1'; // Tuesday
  if (dow === 4) return 'd2'; // Thursday
  if (dow === 6) return 'd3'; // Saturday
  return 'd1'; // fallback
}

function selDay(d) {
  curDay = d; openCard = null;
  ['d1','d2','d3'].forEach(x =>
    document.getElementById('pill-'+x).className = 'day-pill'+(x===d?' on-'+d:''));
  renderLog();
}

function exListForDay(d) {
  const fromHist = Object.keys(histData[d]);
  const extra = extraEx[d] || [];
  // merge, keeping order, no duplicates
  const seen = new Set(fromHist);
  extra.forEach(e => { if (!seen.has(e)) { fromHist.push(e); seen.add(e); } });
  return fromHist;
}

function renderLog() {
  const names = exListForDay(curDay);
  const c = document.getElementById('ex-list');
  c.innerHTML = '';

  if (!names.length) {
    c.innerHTML = '<div class="empty-state"><span class="spinner"></span>Loading…</div>';
    return;
  }

  names.forEach(name => renderExCard(name, c));

  // + Add exercise button
  const addBtn = document.createElement('button');
  addBtn.className = 'add-ex-btn';
  addBtn.innerHTML = '+ Add exercise';
  addBtn.onclick = showAddSheet;
  c.appendChild(addBtn);
}

function renderExCard(name, container) {
  const lc = name.toLowerCase();
  const cfg = exConfig(name);
  const binary = !!cfg.binary;

  // Gather history entries
  const histEntries = [];
  ['d1','d2','d3'].forEach(d => {
    Object.keys(histData[d]).forEach(k => {
      if (k.toLowerCase()===lc) histData[d][k].forEach(e => histEntries.push({date:e.date,raw:e.raw}));
    });
  });
  sessionRows.forEach(r => {
    if (r[3] && r[3].toLowerCase()===lc) {
      const raw = rowSets(r).filter(Boolean).join(' · ');
      if (raw) histEntries.push({date:r[1], raw});
    }
  });
  histEntries.sort((a,b)=>a.date.localeCompare(b.date));
  const last = histEntries.length ? histEntries[histEntries.length-1] : null;

  // State
  if (!exState[name]) exState[name] = {};
  const st = exState[name];
  // Initialise sets array if not present
  if (!st.sets) st.sets = Array(defaultSetCount(name)).fill('');
  const isOpen  = openCard === name;
  const isSaved = !!st.saved;

  // Preview line
  let preview = '';
  if (isSaved) {
    if (binary) preview = st.sets[0] === 'yes' ? '✓ done' : '✗ skipped';
    else preview = st.sets.filter(Boolean).join(' · ') + (st.sets.some(Boolean) ? ' ✓' : '');
  } else if (last) {
    preview = last.raw;
  } else {
    preview = 'No history yet';
  }

  const recent = histEntries.slice(-4);
  const histHTML = recent.map(h =>
    `<div class="hist-row"><div class="hist-dot"></div><div class="hist-date">${fmtDate(h.date)}</div><div class="hist-raw">${h.raw}</div></div>`
  ).join('');

  const card = document.createElement('div');
  card.className = 'ex-card' + (isOpen?' open':'') + (isSaved?' saved':'');
  card.id = 'card-' + eid(name);

  // Build body HTML
  let bodyHTML = '';
  if (binary) {
    const val = st.sets[0] || '';
    bodyHTML = `
      <div class="sets-lbl">Did you complete it?</div>
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <button class="bin-btn${val==='yes'?' bin-on':''}" data-val="yes">Yes ✓</button>
        <button class="bin-btn${val==='no'?' bin-on':''}" data-val="no">No ✗</button>
      </div>`;
  } else {
    const setsHTML = st.sets.map((v,i) => `
      <div class="set-wrap">
        <div class="set-n">Set ${i+1}</div>
        <input class="set-in${v?' filled':''}" type="text"
          id="si-${eid(name)}-${i}" value="${esc(v)}" placeholder="—"
          data-idx="${i}">
      </div>`).join('');
    bodyHTML = `
      <div class="sets-lbl">Today's sets (kg)</div>
      <div class="sets-g" id="sets-g-${eid(name)}">${setsHTML}</div>
      <div style="display:flex;gap:6px;margin-bottom:10px">
        <button class="set-ctrl-btn" data-action="add">+ set</button>
        <button class="set-ctrl-btn" data-action="remove">− set</button>
      </div>`;
  }

  card.innerHTML = `
    <div class="ex-hd">
      <div class="ex-left">
        <div class="ex-nm">${name}</div>
        <div class="ex-pr">${preview}</div>
      </div>
      <div class="ex-right">
        ${isSaved ? '<span class="saved-badge">saved</span>' : ''}
        <span class="ch">▶</span>
      </div>
    </div>
    <div class="ex-bd">
      ${bodyHTML}
      <textarea class="set-note" rows="1" placeholder="Note (optional)"
        id="note-${eid(name)}">${st.note||''}</textarea>
      <div class="btn-row">
        <button class="save-btn">Save ✓</button>
      </div>
      ${histHTML ? `<div class="hist-sec"><div class="hist-ttl">Recent</div>${histHTML}</div>` : ''}
    </div>`;

  // Events
  card.querySelector('.ex-hd').addEventListener('click', () => toggleCard(name));
  card.querySelector('.set-note').addEventListener('input', e => {
    if (!exState[name]) exState[name] = {};
    exState[name].note = e.target.value;
  });
  card.querySelector('.save-btn').addEventListener('click', () => saveEx(name));

  if (binary) {
    card.querySelectorAll('.bin-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!exState[name]) exState[name] = {};
        exState[name].sets = [btn.dataset.val];
        card.querySelectorAll('.bin-btn').forEach(b => b.classList.toggle('bin-on', b===btn));
        exState[name].saved = false;
      });
    });
  } else {
    card.querySelectorAll('.set-in').forEach(inp => {
      inp.addEventListener('input', () => {
        if (!exState[name]) exState[name] = {};
        exState[name].sets[+inp.dataset.idx] = inp.value;
        inp.classList.toggle('filled', inp.value !== '');
        exState[name].saved = false;
        checkAutoSave(name);
      });
    });
    card.querySelectorAll('.set-ctrl-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!exState[name]) exState[name] = {};
        const sets = exState[name].sets;
        if (btn.dataset.action==='add') {
          sets.push('');
        } else {
          if (sets.length > 1) sets.pop();
        }
        exState[name].saved = false;
        // Re-render just this card
        const old = document.getElementById('card-'+eid(name));
        if (old) old.replaceWith(renderExCard(name, null));
      });
    });
  }

  if (container) container.appendChild(card);
  return card;
}

function toggleCard(name) {
  // Save previous open card if it has data
  if (openCard && openCard !== name) {
    maybeAutoSave(openCard);
  }
  openCard = openCard === name ? null : name;
  renderLog();
  // Scroll to open card
  if (openCard) {
    setTimeout(() => {
      const el = document.getElementById('card-'+eid(openCard));
      if (el) el.scrollIntoView({behavior:'smooth', block:'nearest'});
    }, 50);
  }
}

// Auto-save when all default sets are filled (only if not yet saved)
function checkAutoSave(name) {
  const st = exState[name] || {};
  const n = defaultSetCount(name);
  const filled = (st.sets||[]).slice(0,n).every(v=>v&&v.trim());
  if (filled && !st.saved) {
    clearTimeout(st._autoTimer);
    st._autoTimer = setTimeout(() => {
      if (!exState[name].saved) saveEx(name, true);
    }, 800);
  }
}

function maybeAutoSave(name) {
  const st = exState[name] || {};
  if (!st.saved && (st.sets||[]).some(v=>v&&v.trim())) saveEx(name, true);
}

async function saveEx(name, silent=false) {
  const st = exState[name] || {};
  const sets = (st.sets||[]).map(v=>(v||'').trim());
  if (!sets.some(Boolean)) { if (!silent) alert('Enter at least one set.'); return; }

  setSyncBusy('Saving…');
  const today = new Date().toISOString().slice(0,10);
  const lc = name.toLowerCase();

  const existingIdx = sessionRows.findIndex(r =>
    r[1]===today && r[2]===curDay && r[3] && r[3].toLowerCase()===lc
  );

  // Row: [id, date, day, exercise, set1, set2, ..., setN, note]
  const newRow = [
    existingIdx>=0 ? sessionRows[existingIdx][0] : Date.now().toString(),
    today, curDay, name,
    ...sets,
    st.note||''
  ];

  // Sheet range: A to the column for (4 + sets.length + 1) = sets+note
  const lastCol = String.fromCharCode(65 + 3 + sets.length); // A=65, cols: A,B,C,D then sets then note
  try {
    if (existingIdx >= 0) {
      const sheetRow = existingIdx + 2;
      await apiUpdate(`sessions!A${sheetRow}:${lastCol}${sheetRow}`, [newRow]);
      sessionRows[existingIdx] = newRow;
    } else {
      await apiAppend(`sessions!A:${lastCol}`, [newRow]);
      sessionRows.push(newRow);
    }
    exState[name] = {...st, sets, saved:true, _autoTimer:undefined};
    setSyncOk('Saved ✓');
    const old = document.getElementById('card-'+eid(name));
    if (old) old.replaceWith(renderExCard(name, null));
  } catch(e) {
    setSyncErr('Save failed: '+e.message);
  }
}

// ── ADD EXERCISE SHEET ────────────────────────────────────────────────────────
function showAddSheet() {
  document.getElementById('sheet-search').value = '';
  renderSheetExList('');
  document.getElementById('add-sheet').style.display = 'flex';
}
function hideAddSheet() { document.getElementById('add-sheet').style.display = 'none'; }
function closeAddSheet(e) { if (e.target===document.getElementById('add-sheet')) hideAddSheet(); }
function filterSheetList() {
  renderSheetExList(document.getElementById('sheet-search').value.toLowerCase());
}

function renderSheetExList(q) {
  const c = document.getElementById('sheet-ex-list');
  c.innerHTML = '';
  const curNames = new Set(exListForDay(curDay));
  const otherDays = ['d1','d2','d3'].filter(d=>d!==curDay);
  const seen = new Set();
  otherDays.forEach(d => {
    Object.keys(histData[d]).forEach(name => {
      if (!curNames.has(name) && !seen.has(name) && (!q||name.toLowerCase().includes(q))) {
        seen.add(name);
        const div = document.createElement('div');
        div.className = 'sheet-ex-item';
        div.innerHTML = `<span>${name}</span><span class="sheet-ex-day ${d}">${d.toUpperCase()}</span>`;
        div.onclick = () => addExFromOtherDay(name);
        c.appendChild(div);
      }
    });
  });
  if (!c.children.length) {
    c.innerHTML = '<div style="color:var(--t3);font-size:12px;text-align:center;padding:12px">No other exercises found</div>';
  }
}

function addNewExercise() {
  const name = document.getElementById('new-ex-name').value.trim();
  if (!name) return;
  if (!extraEx[curDay].includes(name)) extraEx[curDay].push(name);
  hideAddSheet();
  openCard = name;
  renderLog();
}

function addExFromOtherDay(name) {
  if (!extraEx[curDay].includes(name)) extraEx[curDay].push(name);
  hideAddSheet();
  openCard = name;
  renderLog();
}

// ── SESSIONS VIEW ─────────────────────────────────────────────────────────────
function renderSessions() {
  const c = document.getElementById('sess-list');
  c.innerHTML = '';
  if (!sessionRows.length) {
    c.innerHTML = '<div class="empty-state">No sessions yet.<br>Log exercises to see them here.</div>';
    return;
  }
  const grouped = {};
  sessionRows.forEach(r => {
    const key = r[1]+'|'+r[2];
    if (!grouped[key]) grouped[key] = {date:r[1], day:r[2], exercises:[]};
    grouped[key].exercises.push({name:r[3], sets:rowSets(r), note:rowNote(r)});
  });
  Object.keys(grouped).sort().reverse().forEach(key => {
    const s = grouped[key];
    const div = document.createElement('div');
    div.className = 'sess-card';
    div.innerHTML = `
      <div class="sess-top">
        <div><div class="sess-name">${fmtDate(s.date)}</div>
        <div class="sess-meta">${s.exercises.length} exercise${s.exercises.length!==1?'s':''}</div></div>
        <span class="sess-tag ${s.day||''}">${(s.day||'').toUpperCase()}</span>
      </div>`;
    div.onclick = () => showModal(s);
    c.appendChild(div);
  });
}

function showModal(s) {
  modalSess = s;
  renderModalBody();
  document.getElementById('modal').style.display = 'flex';
}

function renderModalBody() {
  const s = modalSess;
  document.getElementById('modal-ttl').textContent = fmtDate(s.date)+' — '+(s.day||'').toUpperCase();
  const body = document.getElementById('modal-body');
  body.innerHTML = '';
  s.exercises.forEach((ex, i) => {
    const row = document.createElement('div');
    row.className = 'modal-ex-row';
    row.style.display = 'flex';
    row.style.alignItems = 'flex-start';
    row.style.justifyContent = 'space-between';
    row.style.gap = '8px';
    row.innerHTML = `
      <div style="flex:1;min-width:0">
        <div class="modal-ex-nm">${ex.name}</div>
        <div class="modal-ex-sets">${ex.sets.filter(Boolean).join(' · ')}${ex.sets.some(Boolean)?' kg':''}</div>
        ${ex.note?`<div class="modal-ex-note">${ex.note}</div>`:''}
      </div>
      <button class="del-ex-btn" title="Delete this exercise">🗑</button>`;
    row.querySelector('.del-ex-btn').addEventListener('click', () => deleteExFromSession(i));
    body.appendChild(row);
  });
}

async function deleteExFromSession(exIdx) {
  const s = modalSess;
  const ex = s.exercises[exIdx];
  if (!confirm(`Remove "${ex.name}" from this session?`)) return;

  setSyncBusy('Deleting…');
  try {
    // Find all sessionRows matching this session (date+day)
    const rowsForSession = sessionRows
      .map((r,i) => ({r,i}))
      .filter(({r}) => r[1]===s.date && r[2]===s.day && r[3] && r[3].toLowerCase()===ex.name.toLowerCase());

    // Clear each matching row in the sheet
    for (const {i} of rowsForSession) {
      await apiClearRow(i);
    }

    // Remove from sessionRows in memory
    const toRemove = new Set(rowsForSession.map(x=>x.i));
    sessionRows = sessionRows.filter((_,i) => !toRemove.has(i));

    // Remove from modalSess
    s.exercises.splice(exIdx, 1);

    // Clear exState for today if it matches
    const today = new Date().toISOString().slice(0,10);
    if (s.date === today) delete exState[ex.name];

    setSyncOk('Deleted ✓');

    if (s.exercises.length === 0) {
      // Session now empty — close modal, re-render sessions list
      hideModal();
      renderSessions();
      if (curView === 'log') renderLog();
    } else {
      renderModalBody();
      renderSessions();
      if (curView === 'log') renderLog();
    }
  } catch(e) {
    setSyncErr('Delete failed: '+e.message);
  }
}

function hideModal() { document.getElementById('modal').style.display='none'; }
function closeModalOutside(e) { if(e.target===document.getElementById('modal')) hideModal(); }
function loadAsTemplate() {
  if (!modalSess) return;
  template = {day:modalSess.day, sets:{}};
  modalSess.exercises.forEach(ex => {
    template.sets[ex.name] = {s1:ex.sets[0]||'', s2:ex.sets[1]||'', s3:ex.sets[2]||''};
  });
  hideModal(); selDay(modalSess.day); switchView('log');
}

// ── GRAPH VIEW ────────────────────────────────────────────────────────────────

// Build a canonical name map: lowercase -> canonical (first seen, preserving case)
function buildNameMap() {
  const map = {}; // lowercase -> canonical name
  ['d1','d2','d3'].forEach(day => {
    Object.keys(histData[day]).forEach(name => {
      const k = name.toLowerCase();
      if (!map[k]) map[k] = name;
    });
  });
  sessionRows.forEach(r => {
    if (!r[3]) return;
    const k = r[3].toLowerCase();
    if (!map[k]) map[k] = r[3];
  });
  return map;
}

// Get all history entries for an exercise (case-insensitive, all days + sessions)
// Returns [{date, s1, s2, s3, note, isPartial}] sorted by date
// s1/s2/s3 are the parsed max kg for each set (null if not present)
function getAllEntries(canonicalName) {
  const lc = canonicalName.toLowerCase();
  const byDate = {}; // date -> {s1,s2,s3,note,isPartial}

  function ensureDate(d) {
    if (!byDate[d]) byDate[d] = {s1:null, s2:null, s3:null, note:'', isPartial:false};
  }

  // From history sheets — raw strings like "80-100-120", stored as one entry per session
  // We don't know which is s1/s2/s3 from history, so split by dash for the 3 main values
  ['d1','d2','d3'].forEach(day => {
    Object.keys(histData[day]).forEach(name => {
      if (name.toLowerCase() !== lc) return;
      histData[day][name].forEach(h => {
        ensureDate(h.date);
        // Split raw into per-set parts by dash (top-level, not inside parens)
        const parts = splitSets(h.raw);
        parts.forEach((part, i) => {
          if (i > 2) return;
          const p = parseWeights(part);
          if (p) {
            const key = 's'+(i+1);
            byDate[h.date][key] = p.maxKg;
            if (p.isPartial) byDate[h.date].isPartial = true;
          }
        });
      });
    });
  });

  // From saved sessions — variable number of set columns
  sessionRows.forEach(r => {
    if (!r[3] || r[3].toLowerCase() !== lc) return;
    const d = r[1];
    ensureDate(d);
    rowSets(r).forEach((v,i) => {
      const p = parseWeights(v||'');
      if (p) {
        byDate[d]['s'+(i+1)] = p.maxKg;
        if (p.isPartial) byDate[d].isPartial = true;
      }
    });
    const note = rowNote(r);
    if (note) byDate[d].note = byDate[d].note ? byDate[d].note+'; '+note : note;
  });

  return Object.keys(byDate).sort().map(d => ({date:d, ...byDate[d]}));
}

// Split "80-100-120(6 at 130)" into ["80","100","120(6 at 130)"]
// Splits on dashes that are NOT inside parentheses
function splitSets(raw) {
  const parts = [];
  let depth = 0, cur = '';
  for (const ch of raw) {
    if (ch==='(') { depth++; cur+=ch; }
    else if (ch===')') { depth--; cur+=ch; }
    else if (ch==='-' && depth===0) { parts.push(cur.trim()); cur=''; }
    else cur+=ch;
  }
  if (cur.trim()) parts.push(cur.trim());
  return parts;
}

async function refreshData() {
  const btn = document.querySelector('[onclick="refreshData()"]');
  if (btn) { btn.textContent='↻ …'; btn.disabled=true; }
  await loadAll();
  if (btn) { btn.textContent='↻ Refresh'; btn.disabled=false; }
  const nm = document.getElementById('gd-name').textContent;
  if (nm && document.getElementById('graph-detail').style.display!=='none') showGraph(nm);
}

// Parse a raw weight string. Returns {maxKg, minKg, isPartial} or null.
//
// Formats:
//   "80-100-120"         mainNums=[80,100,120]              isPartial=false
//   "25(6+6)"            mainNums=[25], paren="6+6" (reps)  isPartial=false
//   "20(6 at 25)"        mainNums=[20], attempted=[25]       isPartial=true
//   "20-20-20(6 at 25)"  mainNums=[20,20,20], attempted=[25] isPartial=true
//
// Numbers inside parens are rep counts UNLESS preceded by "at", in which case
// the number after "at" is an attempted weight.
function parseWeights(raw) {
  if (!raw || raw==='done' || raw.trim()==='') return null;

  // Strip everything inside parens to get main weights only
  const mainPart = raw.replace(/\(.*?\)/g, '');
  const mainNums = (mainPart.match(/\d+(?:\.\d+)?/g)||[]).map(Number).filter(n=>n>0);

  // Find all "at X" patterns → attempted weights
  const attempted = [];
  const atRe = /\bat\s+(\d+(?:\.\d+)?)/gi;
  let m;
  while ((m=atRe.exec(raw))!==null) attempted.push(Number(m[1]));

  const allWeights = [...mainNums, ...attempted];
  if (!allWeights.length) return null;

  const isPartial = attempted.length > 0 &&
    Math.max(...attempted) > (mainNums.length ? Math.max(...mainNums) : 0);

  return {
    maxKg: Math.max(...allWeights),
    minKg: mainNums.length ? Math.min(...mainNums) : Math.min(...allWeights),
    isPartial
  };
}

function renderGraphList() {
  const c = document.getElementById('graph-ex-list');
  c.innerHTML = '';
  const q = document.getElementById('graph-search').value.toLowerCase();
  const nameMap = buildNameMap();
  const all = [];
  const seen = new Set();
  Object.values(nameMap).forEach(name => {
    const lc = name.toLowerCase();
    if (seen.has(lc)) return;
    seen.add(lc);
    if (q && !lc.includes(q)) return;
    // Count total sessions across all days
    let count = 0;
    ['d1','d2','d3'].forEach(day => {
      Object.keys(histData[day]).forEach(k => {
        if (k.toLowerCase()===lc) count += histData[day][k].length;
      });
    });
    count += sessionRows.filter(r => r[3] && r[3].toLowerCase()===lc).length;
    all.push({name, count});
  });
  all.sort((a,b)=>a.name.toLowerCase().localeCompare(b.name.toLowerCase())).forEach(x => {
    const div = document.createElement('div');
    div.className = 'graph-ex-item';
    div.innerHTML = `<div><div class="graph-ex-nm">${x.name}</div></div><div style="color:var(--t3);font-size:11px">${x.count} sessions ▶</div>`;
    div.onclick = () => showGraph(x.name);
    c.appendChild(div);
  });
}

function filterGraphList() { renderGraphList(); }
function backToGraphList() {
  document.getElementById('graph-list-view').style.display='block';
  document.getElementById('graph-detail').style.display='none';
}

function showGraph(exName) {
  document.getElementById('graph-list-view').style.display='none';
  document.getElementById('graph-detail').style.display='block';
  document.getElementById('gd-name').textContent = exName;
  document.getElementById('gd-sub').textContent  = 'Per set · hollow point = attempted weight';

  const entries = getAllEntries(exName);
  const labels  = entries.map(e => fmtDate(e.date));

  const s1vals = entries.map(e => e.s1);
  const s2vals = entries.map(e => e.s2);
  const s3vals = entries.map(e => e.s3);

  const c1='#5bb8f5', c2='#c5f135', c3='#f56b8b';

  function dataset(label, data, col) {
    return {
      label, data,
      borderColor: col,
      backgroundColor: 'transparent',
      fill: false,
      tension: .35,
      pointRadius: 4,
      pointBackgroundColor: entries.map((e,i) => (data[i]!==null && e.isPartial) ? 'transparent' : col),
      pointBorderColor: col,
      pointBorderWidth: 2,
      spanGaps: true,
    };
  }

  if (chartInst) { chartInst.destroy(); chartInst=null; }

  chartInst = new Chart(document.getElementById('main-chart').getContext('2d'), {
    type: 'line',
    data: { labels, datasets: [
      dataset('Set 1', s1vals, c1),
      dataset('Set 2', s2vals, c2),
      dataset('Set 3', s3vals, c3),
    ]},
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display:true, labels:{color:'#888',font:{size:11},boxWidth:16,padding:10} },
        tooltip: {
          mode: 'index', intersect: false,
          callbacks: {
            title: (items) => fmtDate(entries[items[0].dataIndex].date),
            label: (c) => {
              const v = c.parsed.y;
              if (v===null||v===undefined) return null;
              return c.dataset.label+': '+v+' kg'+(entries[c.dataIndex].isPartial?' ◌':'');
            },
            afterBody: (items) => {
              const note = entries[items[0].dataIndex].note;
              return note ? ['','📝 '+note] : [];
            }
          }
        }
      },
      scales: {
        x: { ticks:{color:'#666',font:{size:10},maxRotation:45,maxTicksLimit:8}, grid:{color:'rgba(255,255,255,.05)'} },
        y: { ticks:{color:'#666',font:{size:10}}, grid:{color:'rgba(255,255,255,.05)'} }
      }
    }
  });

  const allVals = [...s1vals,...s2vals,...s3vals].filter(v=>v!==null);
  const lastS3  = s3vals.filter(v=>v!==null);
  const firstS3 = s3vals.find(v=>v!==null);
  const prog = (lastS3.length>1&&firstS3) ? Math.round((lastS3[lastS3.length-1]-firstS3)/firstS3*100) : null;
  document.getElementById('st-max').textContent  = allVals.length ? Math.max(...allVals)+' kg':'—';
  document.getElementById('st-min').textContent  = allVals.length ? Math.min(...allVals)+' kg':'—';
  document.getElementById('st-sess').textContent = entries.length||'—';
  document.getElementById('st-prog').textContent = prog!==null?(prog>0?'+':'')+prog+'% (S3)':'—';
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function switchView(v) {
  curView = v;
  ['log','sessions','graph'].forEach(x=>{
    document.getElementById('view-'+x).style.display  = x===v?'block':'none';
    document.getElementById('nb-'+x).classList.toggle('active', x===v);
  });
  if (v==='sessions') renderSessions();
  if (v==='graph')    renderGraphList();
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function eid(s)  { return s.replace(/[^a-zA-Z0-9]/g,'_'); }
function esc(s)  { return s.replace(/"/g,'&quot;'); }
function fmtDate(iso){ return new Date(iso+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'}); }
// kept for backward compat in saveEx
function parseMax(raw){ const p = parseWeights(raw); return p ? p.maxKg : null; }
