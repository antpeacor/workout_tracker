<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="theme-color" content="#111">
<title>Broccolift</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@600;700&display=swap" rel="stylesheet">
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<style>
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
:root{
  --bg:#111;--s1:#1c1c1c;--s2:#252525;--s3:#2e2e2e;
  --b1:rgba(255,255,255,.07);--b2:rgba(255,255,255,.14);--b3:rgba(255,255,255,.28);
  --t1:#f0ede8;--t2:#999;--t3:#555;
  --ac:#c5f135;--ac2:rgba(197,241,53,.14);
  --d1:#5bb8f5;--d1b:rgba(91,184,245,.13);
  --d2:#f56b8b;--d2b:rgba(245,107,139,.13);
  --d3:#f5b535;--d3b:rgba(245,181,53,.13);
  --r:10px;--mono:'DM Mono',monospace;--sans:'Syne',sans-serif;
}
html,body{background:var(--bg);color:var(--t1);font-family:var(--mono);min-height:100vh;-webkit-font-smoothing:antialiased;font-size:14px}
.app{max-width:480px;margin:0 auto;padding:0 12px 100px}

/* AUTH */
#auth-screen{display:flex;flex-direction:column;align-items:center;justify-content:center;min-height:100vh;text-align:center;padding:32px}
.auth-logo{font-family:var(--sans);font-size:48px;font-weight:700;letter-spacing:-2px;margin-bottom:6px}
.auth-logo span{color:var(--ac)}
.auth-sub{font-size:13px;color:var(--t3);margin-bottom:48px}
.auth-btn{display:flex;align-items:center;gap:12px;padding:14px 28px;background:var(--s1);border:1px solid var(--b2);border-radius:var(--r);cursor:pointer;font-family:var(--mono);font-size:14px;color:var(--t1);transition:border-color .15s}
.auth-btn:hover{border-color:var(--b3)}
.auth-btn svg{width:20px;height:20px;flex-shrink:0}
.auth-note{font-size:11px;color:var(--t3);margin-top:20px;max-width:280px;line-height:1.7}

/* SYNC */
.sync-bar{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--t3);margin-bottom:12px;min-height:18px}
.sync-dot{width:6px;height:6px;border-radius:50%;background:var(--t3);flex-shrink:0}
.sync-dot.ok{background:#5bf5a0}.sync-dot.err{background:#f56b8b}.sync-dot.busy{background:var(--ac);animation:pulse 1s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* NAV */
nav{position:fixed;bottom:0;left:50%;transform:translateX(-50%);width:100%;max-width:480px;background:var(--s1);border-top:1px solid var(--b2);display:flex;z-index:99;padding-bottom:env(safe-area-inset-bottom)}
.nav-btn{flex:1;padding:14px 0 10px;border:none;background:none;color:var(--t3);font-family:var(--mono);font-size:11px;cursor:pointer;display:flex;flex-direction:column;align-items:center;gap:4px;transition:color .15s}
.nav-btn svg{width:20px;height:20px;stroke:currentColor;fill:none;stroke-width:1.8;stroke-linecap:round;stroke-linejoin:round}
.nav-btn.active{color:var(--ac)}

/* HEADER */
header{display:flex;align-items:center;justify-content:space-between;padding:18px 0 10px}
.logo{font-family:var(--sans);font-size:20px;font-weight:700;letter-spacing:-1px}
.logo span{color:var(--ac)}
.hdr-r{display:flex;align-items:center;gap:8px}
.badge{font-size:11px;color:var(--t3);background:var(--s1);border:1px solid var(--b1);padding:3px 10px;border-radius:20px}
.signout-btn{background:none;border:none;color:var(--t3);font-size:11px;cursor:pointer;font-family:var(--mono)}
.signout-btn:hover{color:var(--t2)}

/* DAY PILLS */
.day-row{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:16px}
.day-pill{padding:12px 6px;border:1px solid var(--b1);background:var(--s1);border-radius:var(--r);cursor:pointer;text-align:center;transition:all .15s;user-select:none}
.day-pill .dl{font-family:var(--sans);font-size:17px;font-weight:700;display:block;margin-bottom:1px}
.day-pill .ds{font-size:10px;color:var(--t3)}
.day-pill.on-d1{background:var(--d1b);border-color:var(--d1)}.day-pill.on-d1 .dl{color:var(--d1)}
.day-pill.on-d2{background:var(--d2b);border-color:var(--d2)}.day-pill.on-d2 .dl{color:var(--d2)}
.day-pill.on-d3{background:var(--d3b);border-color:var(--d3)}.day-pill.on-d3 .dl{color:var(--d3)}

/* EXERCISE CARD */
.ex-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:8px;overflow:hidden;transition:border-color .2s}
.ex-card.open{border-color:var(--b2)}
.ex-card.saved{border-color:rgba(197,241,53,.4)}
.ex-hd{display:flex;align-items:center;justify-content:space-between;padding:14px;cursor:pointer;-webkit-tap-highlight-color:transparent;user-select:none}
.ex-left{flex:1;min-width:0}
.ex-nm{font-family:var(--sans);font-size:14px;font-weight:700;color:var(--t1);margin-bottom:3px}
.ex-pr{font-size:11px;color:var(--t3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.ex-right{display:flex;align-items:center;gap:8px;flex-shrink:0;margin-left:8px}
.saved-badge{font-size:10px;color:var(--ac);background:var(--ac2);padding:2px 8px;border-radius:20px;white-space:nowrap}
.ch{color:var(--t3);font-size:11px;transition:transform .2s;display:inline-block}
.ex-card.open .ch{transform:rotate(90deg)}
.ex-bd{display:none;border-top:1px solid var(--b1);padding:14px}
.ex-card.open .ex-bd{display:block}

/* SETS */
.sets-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.sets-g{display:grid;grid-template-columns:1fr 1fr 1fr;gap:8px;margin-bottom:10px}
.set-wrap{display:flex;flex-direction:column;gap:3px}
.set-n{font-size:10px;color:var(--t3);text-align:center}
.set-in{width:100%;padding:11px 4px;text-align:center;font-family:var(--mono);font-size:14px;font-weight:500;background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--t1);transition:border-color .15s;}
.set-in:focus{outline:none;border-color:var(--b3);background:var(--s3)}
.set-in.filled{border-color:rgba(255,255,255,.25)}
.set-note{width:100%;margin-bottom:10px;padding:8px 10px;font-family:var(--mono);font-size:12px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--t2);resize:none}
.set-note:focus{outline:none;border-color:var(--b2)}
.btn-row{display:flex;gap:8px}
.save-btn{flex:1;padding:12px;border:none;background:var(--ac);color:#111;font-family:var(--sans);font-size:13px;font-weight:700;border-radius:8px;cursor:pointer;transition:opacity .15s}
.save-btn:active{opacity:.8}
.save-btn:disabled{opacity:.4;cursor:not-allowed}
.tmpl-banner{font-size:11px;color:var(--t3);margin-bottom:10px;padding:7px 10px;background:var(--s2);border-radius:6px;border:1px solid var(--b1);line-height:1.5}
.tmpl-banner b{color:var(--t2)}

/* HISTORY */
.hist-sec{margin-top:12px;border-top:1px solid var(--b1);padding-top:10px}
.hist-ttl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:7px}
.hist-row{display:flex;align-items:center;gap:8px;margin-bottom:5px}
.hist-dot{width:6px;height:6px;border-radius:50%;flex-shrink:0;background:var(--t3)}
.hist-date{font-size:10px;color:var(--t3);width:58px;flex-shrink:0}
.hist-raw{font-size:11px;color:var(--t2);flex:1;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}

/* ADD EXERCISE */
.add-ex-btn{width:100%;padding:12px;border:1px dashed var(--b2);background:none;color:var(--t3);font-family:var(--mono);font-size:13px;border-radius:var(--r);cursor:pointer;margin-top:4px;transition:all .15s;display:flex;align-items:center;justify-content:center;gap:8px}
.add-ex-btn:hover{border-color:var(--b3);color:var(--t2)}
/* BINARY BUTTONS */
.bin-btn{flex:1;padding:12px;border:1px solid var(--b2);background:var(--s2);color:var(--t2);font-family:var(--mono);font-size:14px;border-radius:8px;cursor:pointer;transition:all .15s}
.bin-btn.bin-on{background:var(--ac2);border-color:var(--ac);color:var(--ac);font-weight:700}
/* SET CONTROL */
.set-ctrl-btn{padding:6px 14px;border:1px solid var(--b2);background:none;color:var(--t3);font-family:var(--mono);font-size:12px;border-radius:6px;cursor:pointer;transition:all .15s}
.set-ctrl-btn:hover{border-color:var(--b3);color:var(--t2)}
.del-day-btn{padding:10px 14px;border:1px solid rgba(245,107,139,.3);background:none;color:#f56b8b;font-family:var(--mono);font-size:12px;border-radius:8px;cursor:pointer;transition:all .15s;white-space:nowrap}
.del-day-btn:hover{background:rgba(245,107,139,.1);border-color:#f56b8b}

/* ADD SHEET (bottom sheet) */
.sheet-overlay{position:fixed;inset:0;background:rgba(0,0,0,.7);z-index:150;display:flex;align-items:flex-end;justify-content:center}
.sheet{background:var(--s1);width:100%;max-width:480px;border-radius:16px 16px 0 0;padding:20px 16px 40px;max-height:80vh;overflow-y:auto}
.sheet-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.sheet-ttl{font-family:var(--sans);font-size:16px;font-weight:700}
.close-btn{background:none;border:none;color:var(--t2);cursor:pointer;font-size:24px;line-height:1}
.sheet-section{margin-bottom:16px}
.sheet-sec-lbl{font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:8px}
.sheet-ex-item{padding:11px 14px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;margin-bottom:6px;cursor:pointer;font-size:13px;color:var(--t1);transition:border-color .15s;display:flex;align-items:center;justify-content:space-between}
.sheet-ex-item:hover{border-color:var(--b2)}
.sheet-ex-day{font-size:10px;padding:2px 7px;border-radius:20px}
.sheet-ex-day.d1{background:var(--d1b);color:var(--d1)}
.sheet-ex-day.d2{background:var(--d2b);color:var(--d2)}
.sheet-ex-day.d3{background:var(--d3b);color:var(--d3)}
.new-ex-row{display:flex;gap:8px}
.new-ex-in{flex:1;padding:10px 12px;font-family:var(--mono);font-size:13px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--t1)}
.new-ex-in:focus{outline:none;border-color:var(--b2)}
.new-ex-add{padding:10px 16px;border:none;background:var(--ac);color:#111;font-family:var(--sans);font-size:13px;font-weight:700;border-radius:8px;cursor:pointer;white-space:nowrap}
.sheet-search{width:100%;padding:9px 12px;font-family:var(--mono);font-size:13px;background:var(--s2);border:1px solid var(--b1);border-radius:8px;color:var(--t1);margin-bottom:10px}
.sheet-search:focus{outline:none;border-color:var(--b2)}

/* SESSIONS VIEW */
.sec-title{font-family:var(--sans);font-size:16px;font-weight:700;margin-bottom:14px}
.sess-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:8px;padding:13px 14px;cursor:pointer;transition:border-color .15s}
.sess-card:hover{border-color:var(--b2)}
.sess-top{display:flex;align-items:center;justify-content:space-between}
.sess-name{font-family:var(--sans);font-size:14px;font-weight:700}
.sess-meta{font-size:11px;color:var(--t3);margin-top:3px}
.sess-tag{font-size:10px;padding:2px 8px;border-radius:20px;font-weight:700}
.sess-tag.d1{background:var(--d1b);color:var(--d1)}.sess-tag.d2{background:var(--d2b);color:var(--d2)}.sess-tag.d3{background:var(--d3b);color:var(--d3)}
.empty-state{text-align:center;padding:40px 0;color:var(--t3);font-size:13px;line-height:1.9}

/* MODAL */
.modal-overlay{position:fixed;inset:0;background:rgba(0,0,0,.75);z-index:200;display:flex;align-items:flex-end;justify-content:center}
.modal{background:var(--s1);width:100%;max-width:480px;border-radius:16px 16px 0 0;max-height:85vh;overflow-y:auto;padding:20px 16px 40px}
.modal-hd{display:flex;align-items:center;justify-content:space-between;margin-bottom:16px}
.modal-ttl{font-family:var(--sans);font-size:17px;font-weight:700}
.modal-ex-row{border-bottom:1px solid var(--b1);padding:10px 0}
.modal-ex-nm{font-size:12px;color:var(--t2);margin-bottom:3px}
.modal-ex-sets{font-size:14px;color:var(--t1)}
.modal-ex-note{font-size:11px;color:var(--t3);margin-top:2px}
.load-btn{width:100%;margin-top:16px;padding:12px;border:1px solid var(--ac);background:var(--ac2);color:var(--ac);font-family:var(--sans);font-size:14px;font-weight:700;border-radius:8px;cursor:pointer}
.del-ex-btn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:15px;padding:4px;flex-shrink:0;line-height:1;margin-top:2px}
.del-ex-btn:hover{color:#f56b8b}
.edit-ex-btn{background:none;border:none;color:var(--t3);cursor:pointer;font-size:15px;padding:4px;flex-shrink:0;line-height:1;margin-top:2px}
.edit-ex-btn:hover{color:var(--t2)}

.recap-btn{padding:4px 10px;border:1px solid var(--b2);background:none;color:var(--t3);font-family:var(--mono);font-size:11px;border-radius:6px;cursor:pointer;transition:all .15s;white-space:nowrap}
.recap-btn:hover{border-color:var(--b3);color:var(--t2)}
.tab-btn{flex:1;padding:8px;font-family:var(--sans);font-size:13px;font-weight:600;border:none;background:none;color:var(--t3);border-radius:8px;cursor:pointer;transition:all .15s}
.tab-btn.active{background:var(--s2);color:var(--t1)}
.muscle-row{display:flex;align-items:center;gap:8px;margin-bottom:8px}
.muscle-name{font-size:12px;color:var(--t2);width:100px;flex-shrink:0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.muscle-bar-bg{flex:1;height:7px;background:var(--s2);border-radius:4px;overflow:hidden}
.muscle-bar{height:7px;border-radius:4px;transition:width .6s cubic-bezier(.22,1,.36,1)}
.muscle-pct{font-size:11px;font-family:var(--mono);color:var(--t3);width:36px;text-align:right;flex-shrink:0}
/* HEATMAP */
.heatmap-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:14px 16px;margin-bottom:12px;overflow-x:auto}
.heatmap-ttl{font-family:var(--sans);font-size:15px;font-weight:700;margin-bottom:4px}
.heatmap-sub{font-size:11px;color:var(--t3);margin-bottom:14px}
.heatmap-table{border-collapse:collapse;width:100%;min-width:320px}
.heatmap-table th{font-size:10px;color:var(--t3);font-weight:400;padding:2px 4px;text-align:center;white-space:nowrap}
.heatmap-table td.muscle-lbl{font-size:11px;color:var(--t2);padding:3px 8px 3px 0;white-space:nowrap;text-align:left}
.heatmap-table td.hm-cell{width:36px;height:28px;border-radius:6px;text-align:center;font-size:9px;font-family:var(--mono);transition:background .3s;padding:0 2px}
.hm-legend{display:flex;align-items:center;gap:8px;margin-top:12px;font-size:10px;color:var(--t3)}
.hm-legend-bar{display:flex;gap:2px}
.hm-legend-cell{width:16px;height:10px;border-radius:2px}
.search-in{width:100%;padding:10px 14px;font-family:var(--mono);font-size:13px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);color:var(--t1);margin-bottom:12px}
.search-in:focus{outline:none;border-color:var(--b2)}
.graph-ex-item{display:flex;align-items:center;justify-content:space-between;padding:12px 14px;background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);margin-bottom:8px;cursor:pointer;transition:border-color .15s}
.graph-ex-item:hover{border-color:var(--b2)}
.graph-ex-nm{font-family:var(--sans);font-size:14px;font-weight:700}
.graph-day-tag{font-size:10px;padding:2px 8px;border-radius:20px;margin-top:3px;display:inline-block}
.graph-day-tag.d1{background:var(--d1b);color:var(--d1)}.graph-day-tag.d2{background:var(--d2b);color:var(--d2)}.graph-day-tag.d3{background:var(--d3b);color:var(--d3)}
.back-btn{display:flex;align-items:center;gap:6px;background:none;border:none;color:var(--t2);font-family:var(--mono);font-size:13px;cursor:pointer;padding:0;margin-bottom:14px}
.chart-card{background:var(--s1);border:1px solid var(--b1);border-radius:var(--r);padding:16px;margin-bottom:12px}
.chart-ttl{font-family:var(--sans);font-size:16px;font-weight:700;margin-bottom:2px}
.chart-sub{font-size:11px;color:var(--t3);margin-bottom:14px}
.chart-wrap{position:relative;height:200px}
.stat-row{display:grid;grid-template-columns:1fr 1fr 1fr 1fr;gap:8px;margin-top:12px}
.stat-box{background:var(--s2);border-radius:8px;padding:10px;text-align:center}
.stat-val{font-family:var(--sans);font-size:16px;font-weight:700}
.stat-lbl{font-size:10px;color:var(--t3);margin-top:2px}
.spinner{display:inline-block;width:14px;height:14px;border:2px solid var(--b2);border-top-color:var(--ac);border-radius:50%;animation:spin .7s linear infinite;vertical-align:middle;margin-right:6px}
@keyframes spin{to{transform:rotate(360deg)}}
</style>
</head>

<script>
function onGsiLoad() {
  initAuth();
  // If we have a stored email, try silent re-auth first
  const email = localStorage.getItem('lift_user');
  if (!email) return;
  tryReconnect();
}

function tryReconnect() {
  try {
    const client = google.accounts.oauth2.initTokenClient({
      client_id: '281076985814-vq0vfa3jces2jlttd236jofhn9jo7v42.apps.googleusercontent.com',
      scope: 'https://www.googleapis.com/auth/spreadsheets https://www.googleapis.com/auth/userinfo.email',
      prompt: 'none',  // never show UI — fail silently if can't auto-auth
      login_hint: localStorage.getItem('lift_user') || '',
      callback: async (resp) => {
        if (resp.error) {
          showReconnectBanner();
          return;
        }
        token = resp.access_token;
        const bar = document.getElementById('reconnect-bar');
        if (bar) bar.style.display = 'none';
        showApp();
        await loadAll();
      }
    });
    client.requestAccessToken();

// Row layout: [id, date, day, exercise, set1, set2, ..., setN, note]
// The note is ALWAYS stored as the very last element of the row.
// Sets are everything between index 4 and the second-to-last element (inclusive).
// If there is no note, the last element is the last set.
// We distinguish note from set by checking if it matches the set pattern.
const SET_PATTERN = /^[\d][\d\s\.\-\(\)\+at\/x]*$/i;

function rowSets(r) {
  const cols = r.slice(4).map(v => (v == null ? '' : String(v)).trim());
  if (!cols.length) return [];
  // If the last non-empty value doesn't look like a set, it's a note — exclude it
  let end = cols.length;
  for (let i = cols.length - 1; i >= 0; i--) {
    if (!cols[i]) continue; // skip empty trailing
    if (!SET_PATTERN.test(cols[i])) end = i; // note found at i
    break;
  }
  return cols.slice(0, end).filter(v => v !== '');
}

function rowNote(r) {
  const cols = r.slice(4).map(v => (v == null ? '' : String(v)).trim());
  for (let i = cols.length - 1; i >= 0; i--) {
    if (!cols[i]) continue;
    if (!SET_PATTERN.test(cols[i])) {
      // Strip [exclude] flag from display note
      return cols[i].replace(/^\[exclude\]\s*/i, '').trim();
    }
    break;
  }
  return '';
}

function rowRawNote(r) {
  // Raw note including [exclude] flag
  const cols = r.slice(4).map(v => (v == null ? '' : String(v)).trim());
  for (let i = cols.length - 1; i >= 0; i--) {
    if (!cols[i]) continue;
    if (!SET_PATTERN.test(cols[i])) return cols[i];
    break;
  }
  return '';
}

function rowExcluded(r) {
  return /^\[exclude\]/i.test(rowRawNote(r));
}

// Canonical sheet row number for a sessionRow (1-based, accounts for header)
// We store it as r._sheetRow when loading
function rowSheetRow(r) { return r._sheetRow; }

function rowToState(r) {
  return { sets: rowSets(r), note: rowNote(r), saved: true };
}

function restoreTodayState() {
  const today = new Date().toISOString().slice(0,10);
  // Build map of name -> latest row (by _sheetRow) for today
  const todayRows = {};
  sessionRows.forEach(r => {
    if (r[1] !== today || !r[3]) return;
    const name = r[3];
    if (!todayRows[name] || r._sheetRow > todayRows[name]._sheetRow)
      todayRows[name] = r;
  });
  Object.entries(todayRows).forEach(([name, r]) => {
    if (exState[name]) return; // don't overwrite live edits
    exState[name] = rowToState(r);
  });
}

    }
  });
  histEntries.sort((a,b)=>a.date.localeCompare(b.date));
  const last = histEntries.length ? histEntries[histEntries.length-1] : null;

  // State
  if (!exState[name]) exState[name] = {};
  const st = exState[name];
  // Initialise sets array if not present
  if (!st.sets) st.sets = Array(defaultSetCount(name)).fill('');
  const isOpen  = openCard === name;
  const isSaved = !!st.saved;

  // Preview line
  let preview = '';
  if (isSaved) {
    if (binary) preview = st.sets[0] === 'yes' ? '✓ done' : '✗ skipped';
    else preview = st.sets.filter(Boolean).join(' · ') + (st.sets.some(Boolean) ? ' ✓' : '');
  } else if (last) {
    preview = last.raw;
  } else {
    preview = 'No history yet';

  const recent = histEntries.slice(-4);
  const histHTML = recent.map(h =>
    `<div class="hist-row"><div class="hist-dot"></div><div class="hist-date">${fmtDate(h.date)}</div><div class="hist-raw">${h.raw}</div></div>`
  ).join('');

  const card = document.createElement('div');

  card.id = 'card-' + eid(name);

  // Build body HTML
  let bodyHTML = '';
  if (binary) {
    const val = st.sets[0] || '';
    bodyHTML = `
      <div class="sets-lbl">Did you complete it?</div>
      <div style="display:flex;gap:8px;margin-bottom:10px">
        <button class="bin-btn${val==='yes'?' bin-on':''}" data-val="yes">Yes ✓</button>
        <button class="bin-btn${val==='no'?' bin-on':''}" data-val="no">No ✗</button>
      </div>`;
  } else {
    const setsHTML = st.sets.map((v,i) => `
      <div class="set-wrap">
        <div class="set-n">Set ${i+1}</div>
        <input class="set-in${v?' filled':''}" type="text"
          id="si-${eid(name)}-${i}" value="${esc(v)}" placeholder="—"
          data-idx="${i}">
      </div>`).join('');
    bodyHTML = `
      <div class="sets-lbl">Today's sets (kg)</div>
      <div class="sets-g" id="sets-g-${eid(name)}">${setsHTML}</div>
      <div style="display:flex;gap:6px;margin-bottom:10px">
        <button class="set-ctrl-btn" data-action="add">+ set</button>
        <button class="set-ctrl-btn" data-action="remove">− set</button>
      </div>`;
  }

  card.innerHTML = `
    <div class="ex-hd">
      <div class="ex-left">
        <div class="ex-nm">${name}</div>
        <div class="ex-pr">${preview}</div>
      </div>
      <div class="ex-right">
        ${isSaved ? '<span class="saved-badge">saved</span>' : ''}
        <span class="ch">▶</span>
      </div>
    </div>
    <div class="ex-bd">
      ${bodyHTML}
      <textarea class="set-note" rows="1" placeholder="Note (optional)"
        id="note-${eid(name)}">${st.note||''}</textarea>
      <div class="btn-row">
        <button class="save-btn">Save ✓</button>
        <button class="del-day-btn" title="Remove from ${curDay.toUpperCase()} programme">🗑 Remove</button>
      </div>
      ${histHTML ? `<div class="hist-sec"><div class="hist-ttl">Recent</div>${histHTML}</div>` : ''}
    </div>`;

  // Events
  card.querySelector('.ex-hd').addEventListener('click', () => toggleCard(name));
  card.querySelector('.set-note').addEventListener('input', e => {
    if (!exState[name]) exState[name] = {};
    exState[name].note = e.target.value;
  });
  card.querySelector('.save-btn').addEventListener('click', () => saveEx(name));
  card.querySelector('.del-day-btn').addEventListener('click', () => deleteExFromDay(name));

  if (binary) {
    card.querySelectorAll('.bin-btn').forEach(btn => {
      btn.addEventListener('click', () => {
        if (!exState[name]) exState[name] = {};
        exState[name].sets = [btn.dataset.val];
        card.querySelectorAll('.bin-btn').forEach(b => b.classList.toggle('bin-on', b===btn));
        exState[name].saved = false;

  } else {
    card.querySelectorAll('.set-in').forEach(inp => {
      inp.addEventListener('input', () => {
        if (!exState[name]) exState[name] = {};
        exState[name].sets[+inp.dataset.idx] = inp.value;

        } else {

async function deleteExFromDay(name) {
  if (!confirm(`Remove "${name}" from your ${curDay.toUpperCase()} programme?\n\nThis also removes any entry saved today. History is kept.`)) return;
  setSyncBusy('Removing…');
  try {
    const lc = name.toLowerCase();
    const idx = dayLists[curDay].findIndex(n => n.toLowerCase()===lc);
    if (idx >= 0) {
      // Get sheetId for batchUpdate deleteDimension
      const meta = await fetch(`${API}/${SHEET_ID}?fields=sheets(properties(sheetId,title))`,
        {headers:{Authorization:'Bearer '+token}});
      const metaJson = await meta.json();
      const sheetMeta = metaJson.sheets.find(s => s.properties.title === curDay);
      if (sheetMeta) {
        const gid = sheetMeta.properties.sheetId;
        const rowIdx = idx + 1; // 0-based; +1 skips header row
        await fetch(`${API}/${SHEET_ID}:batchUpdate`, {
          method:'POST',
          headers:{Authorization:'Bearer '+token,'Content-Type':'application/json'},
          body: JSON.stringify({requests:[{deleteDimension:{range:{
            sheetId:gid, dimension:'ROWS', startIndex:rowIdx, endIndex:rowIdx+1
          }}}]})
        });
      }
      dayLists[curDay].splice(idx, 1);
    }
    // Clear today's session entry using _sheetRow
    const today = new Date().toISOString().slice(0,10);
    const matching = sessionRows.filter(r => r[1]===today && r[3] && r[3].toLowerCase()===lc);
    for (const r of matching) await apiClearRow(r._sheetRow);
    const removed = new Set(matching.map(r=>r._sheetRow));
    sessionRows = sessionRows.filter(r => !removed.has(r._sheetRow));
    delete exState[name];

    setSyncOk('Removed ✓');
    openCard = null;
    renderLog();
  } catch(e) {
    setSyncErr('Remove failed: '+e.message);
  }
}

function toggleCard(name) {
  // Save previous open card if it has data
  if (openCard && openCard !== name) {
    maybeAutoSave(openCard);
  }
  openCard = openCard === name ? null : name;
  renderLog();
  // Scroll to open card
  if (openCard) {
    setTimeout(() => {
      const el = document.getElementById('card-'+eid(openCard));
      if (el) el.scrollIntoView({behavior:'smooth', block:'nearest'});
    }, 50);
  }
}

// Auto-save when all default sets are filled (only if not yet saved)
function checkAutoSave(name) {
  const st = exState[name] || {};
  const n = defaultSetCount(name);
  const filled = (st.sets||[]).slice(0,n).every(v=>v&&v.trim());
  if (filled && !st.saved) {
    clearTimeout(st._autoTimer);
    st._autoTimer = setTimeout(() => {
      if (!exState[name].saved) saveEx(name, true);
    }, 800);
  }
}

function maybeAutoSave(name) {
  const st = exState[name] || {};
  if (!st.saved && (st.sets||[]).some(v=>v&&v.trim())) saveEx(name, true);
}

// Convert 0-based column index to A, B, ... Z, AA, AB, ...
function colLetter(n) {
  let s = '';
  n += 1; // 1-based
  while (n > 0) {
    n--;
    s = String.fromCharCode(65 + (n % 26)) + s;
    n = Math.floor(n / 26);
  }
  return s;
}

// Per-exercise save lock to prevent concurrent saves
const _savingLock = {};

async function saveEx(name, silent=false) {
  if (_savingLock[name]) return; // already saving this exercise
  _savingLock[name] = true;

  const st = exState[name] || {};
  const sets = (st.sets||[]).map(v=>(v||'').trim());
  if (!sets.some(Boolean)) {
    _savingLock[name] = false;
    if (!silent) alert('Enter at least one set.');
    return;
  }

  setSyncBusy('Saving…');
  const today = new Date().toISOString().slice(0,10);
  const lc = name.toLowerCase();

  // Always re-search sessionRows fresh to avoid stale references
  const existingRows = sessionRows.filter(r =>
    r[1]===today && r[2]===curDay && r[3] && r[3].toLowerCase()===lc
  );
  const existingRow = existingRows[0] || null;

  const id = existingRow ? existingRow[0] : Date.now().toString();
  const newRowData = [id, today, curDay, name, ...sets, st.note||''];
  const lastCol = colLetter(4 + sets.length);

  try {
    if (existingRow) {
      const sheetRow = existingRow._sheetRow;
      await apiUpdate(`sessions!A${sheetRow}:${lastCol}${sheetRow}`, [newRowData]);
      newRowData._sheetRow = sheetRow;
      const idx = sessionRows.indexOf(existingRow);
      if (idx >= 0) sessionRows[idx] = newRowData;
    } else {
      await apiAppend(`sessions!A:${lastCol}`, [newRowData]);
      // Reload sessions so _sheetRow is accurate — prevents future duplicate appends
      try {
        const rs = await apiGet('sessions!A:P');
        sessionRows = rs.slice(1).map((r, i) => {
          if (!r || !r[0] || !r[3]) return null;
          const row = [...r];
          row._sheetRow = i + 2;
          return row;
        }).filter(Boolean);
      } catch(e) {
        // If reload fails, fall back to estimate
        newRowData._sheetRow = sessionRows.length + 2;
        sessionRows.push(newRowData);
      }
    }
    exState[name] = {...st, sets, saved:true, _autoTimer:undefined};
    setSyncOk('Saved ✓');
    const old = document.getElementById('card-'+eid(name));
    if (old) old.replaceWith(renderExCard(name, null));
  } catch(e) {
    console.error('saveEx error:', e);
    setSyncErr('Save failed: '+e.message);
  } finally {
    _savingLock[name] = false;
  }
}

async function addExToDay(name) {
  const lc = name.toLowerCase();
  if (dayLists[curDay].some(n => n.toLowerCase()===lc)) {
    hideAddSheet(); openCard = name; renderLog(); return;
  }
  setSyncBusy('Adding…');
  try {
    await apiAppend(`${curDay}!A:A`, [[name]]);
    dayLists[curDay].push(name);
    // If not in exercises sheet, add placeholder row with equal scores
    if (!muscleData[lc] && muscleGroups.length) {
      const score = Math.round(100 / muscleGroups.length);
      const row = [name, ...muscleGroups.map(() => score)];
      await apiAppend('exercises!A:K', [row]).catch(()=>{}); // silent fail
      muscleData[lc] = {name, scores: muscleGroups.map(()=>score), total: score*muscleGroups.length, unknown:true};
    }
    setSyncOk('Added ✓');
    hideAddSheet();
    openCard = name;
    renderLog();
  } catch(e) {
    setSyncErr('Add failed: '+e.message);
  }
}

// ── MUSCLE GROUPS ─────────────────────────────────────────────────────────────
// muscleData: { 'exercise lc' -> { groups: ['Quads','Back',...], scores: [80,20,...] } }
// muscleGroups: ordered list of group names from sheet header
let muscleData   = {};
let muscleGroups = [];

function parseExerciseSheet(rows) {
  muscleData   = {};
  muscleGroups = [];
  if (!rows || rows.length < 2) return;
  // Row 0: [exercise, Quads, Hamstrings, ...]
  const header = rows[0];
  muscleGroups = header.slice(1).map(h => (h||'').toString().trim()).filter(Boolean);
  rows.slice(1).forEach(r => {
    if (!r || !r[0]) return;
    const name = r[0].toString().trim();
    if (!name) return;
    const scores = muscleGroups.map((_, i) => parseFloat(r[i+1]) || 0);
    const total  = scores.reduce((a,b)=>a+b,0);
    muscleData[name.toLowerCase()] = { name, scores, total };
  });
}

// Returns {groups, scores, total, unknown} for an exercise
// unknown=true means it's not in the exercises sheet
function exMuscleScores(exName) {
  const lc = exName.toLowerCase().trim();
  if (muscleData[lc]) return {...muscleData[lc], unknown: false};
  // Not found → distribute 10 equally across all groups
  const n = muscleGroups.length || 10;
  const score = Math.round(100 / n);
  return {
    name: exName,
    scores: muscleGroups.map(() => score),
    total: score * n,
    unknown: true,
  };
}

// Muscle group colours (by index, cycles)
const MUSCLE_COLORS = [
  '#5bb8f5','#5bf5c5','#f5b535','#f56b8b',
  '#c5f135','#b58bf5','#f5955b','#5b8bf5','#f5e05b','#5bf5a0'
];
function muscleColor(idx) { return MUSCLE_COLORS[idx % MUSCLE_COLORS.length]; }

// Compute muscle stimulus for a list of exercise names
// Returns [{group, pct, color, unknown}] — pct = fraction of max possible for that group
function computeMuscleRecap(exerciseNames) {
  if (!muscleGroups.length) return [];

  const earned  = new Array(muscleGroups.length).fill(0);
  const possible = new Array(muscleGroups.length).fill(0);
  const hasUnknown = { val: false };

  exerciseNames.forEach(name => {
    const m = exMuscleScores(name);
    if (m.unknown) hasUnknown.val = true;
    m.scores.forEach((s, i) => { earned[i] += s; possible[i] += 100; });
  });

  return {
    bars: muscleGroups.map((g, i) => ({
      group: g,
      pct: possible[i] > 0 ? Math.min(100, Math.round(earned[i] / possible[i] * 100)) : 0,
      color: muscleColor(i),
    })),
    hasUnknown: hasUnknown.val,
  };
}

// Show muscle recap modal for a session
function showMuscleRecap(s) {
  const exNames = s.exercises.map(e => e.name);
  const recap = computeMuscleRecap(exNames);

  document.getElementById('modal-ttl').textContent = 'Muscle recap — ' + fmtDate(s.date);
  const body = document.getElementById('modal-body');
  body.innerHTML = '';

  if (!muscleGroups.length) {
    body.innerHTML = '<div class="empty-state" style="padding:20px 0">No exercises sheet found.<br>Add an <b>exercises</b> tab to your Google Sheet.</div>';
  } else {

      : '';
    body.innerHTML = warning + recap.bars.map(b => `
      <div class="muscle-row" style="margin-bottom:10px">
        <div class="muscle-name" style="width:100px">${b.group}</div>
        <div class="muscle-bar-bg">

        </div>
        <div class="muscle-pct">${b.pct}%</div>
      </div>`).join('');
  }

  // Hide the template button, show close only

async function deleteExFromSession(exIdx) {
  const s = modalSess;
  const ex = s.exercises[exIdx];
  if (!confirm(`Remove "${ex.name}" from this session?`)) return;

  setSyncBusy('Deleting…');
  try {
    const lc = ex.name.toLowerCase();
    const matching = sessionRows.filter(r =>
      r[1]===s.date &&
      (!ex.day || r[2]===ex.day) &&
      r[3] && r[3].toLowerCase()===lc
    );

    for (const r of matching) await apiClearRow(r._sheetRow);
    const removed = new Set(matching.map(r=>r._sheetRow));
    sessionRows = sessionRows.filter(r => !removed.has(r._sheetRow));
    s.exercises.splice(exIdx, 1);

    const today = new Date().toISOString().slice(0,10);
    if (s.date === today) delete exState[ex.name];

    setSyncOk('Deleted ✓');
    if (s.exercises.length === 0) hideModal();
    else renderModalBody();
    renderSessions();
    if (curView === 'log') renderLog();
  } catch(e) {
    setSyncErr('Delete failed: '+e.message);
  }
}

async function cleanDuplicates() {
  // Find all duplicate exercise rows: same date + day + exercise name
  // Keep the row with the most non-empty sets; if tied, keep the one with highest _sheetRow (most recent)
  // Delete the rest

  // Group sessionRows by date+day+exercise
  const groups = {};
  sessionRows.forEach(r => {
    const key = `${r[1]}||${r[2]}||${(r[3]||'').toLowerCase()}`;
    if (!groups[key]) groups[key] = [];
    groups[key].push(r);
  });

  const toDelete = [];
  Object.values(groups).forEach(rows => {
    if (rows.length <= 1) return;
    // Score each row by number of non-empty sets
    const scored = rows.map(r => ({
      r,
      score: rowSets(r).filter(Boolean).length,
    }));
    // Sort: most sets first, then highest sheetRow first (most recent append)
    scored.sort((a,b) => b.score - a.score || b.r._sheetRow - a.r._sheetRow);
    // Keep first, delete the rest
    toDelete.push(...scored.slice(1).map(x => x.r));
  });

  if (!toDelete.length) {
    setSyncOk('No duplicates found ✓');
    return;
  }

  setSyncBusy(`Cleaning ${toDelete.length} duplicate${toDelete.length>1?'s':''}…`);
  try {
    for (const r of toDelete) {
      await apiClearRow(r._sheetRow);
    }
    const removed = new Set(toDelete.map(r => r._sheetRow));
    sessionRows = sessionRows.filter(r => !removed.has(r._sheetRow));
    setSyncOk(`Removed ${toDelete.length} duplicate${toDelete.length>1?'s':''} ✓`);
    renderSessions();
    if (curView === 'log') renderLog();
  } catch(e) {
    setSyncErr('Clean failed: '+e.message);
  }
}

  const s = modalSess;

  const matchingRows = sessionRows
    .filter(r => r[1]===s.date && (!ex.day||r[2]===ex.day) && r[3] && r[3].toLowerCase()===lc);

  if (!matchingRows.length) { setSyncErr('Row not found'); return; }

  try {
    const matchRow = matchingRows[0];

    const sheetRow = matchRow._sheetRow;

    // Update in-memory modalSess
    ex.sets = sets;
    ex.note = note; // display note (without [exclude] prefix)

    // Update exState if today
    const today = new Date().toISOString().slice(0,10);
    if (s.date === today && exState[ex.name]) {
      exState[ex.name] = {...exState[ex.name], sets, note, saved:true};

    cancelEdit();

// Build a canonical name map: lowercase -> canonical (first seen, preserving case)
function buildNameMap() {
  const map = {};
  // From day programme lists (canonical source for exercise names)
  ['d1','d2','d3'].forEach(day => {
    dayLists[day].forEach(name => {
      const k = name.toLowerCase();
      if (!map[k]) map[k] = name;
    });
  });
  // Also pick up anything only in sessions
  sessionRows.forEach(r => {
    if (!r[3]) return;
    const k = r[3].toLowerCase();
    if (!map[k]) map[k] = r[3];
  });
  return map;
}

function getAllEntries(canonicalName) {
  const lc = canonicalName.toLowerCase();
  const byDate = {};

  function ensureDate(d) {
    if (!byDate[d]) byDate[d] = {s1:null, s2:null, s3:null, note:'', isPartial:false, excluded:false};
  }

  sessionRows.forEach(r => {
    if (!r[3] || r[3].toLowerCase() !== lc) return;
    const d = r[1];
    ensureDate(d);

    // Mark excluded if any row for this date is excluded
    if (rowExcluded(r)) { byDate[d].excluded = true; return; }

    rowSets(r).forEach((v, i) => {
      if (i > 2) return; // graph shows up to 3 sets (s1, s2, s3)
      const p = parseWeights(v || '');
      if (p) {
        byDate[d]['s' + (i + 1)] = p.maxKg;
        if (p.isPartial) byDate[d].isPartial = true;
      }
    });
    const note = rowNote(r);
    if (note) byDate[d].note = byDate[d].note ? byDate[d].note + '; ' + note : note;
  });

  // Filter out excluded entries
  return Object.keys(byDate).sort()
    .filter(d => !byDate[d].excluded)
    .map(d => ({date: d, ...byDate[d]}));
}

// Split "80-100-120(6 at 130)" into ["80","100","120(6 at 130)"]
// Splits on dashes that are NOT inside parentheses
function splitSets(raw) {
  const parts = [];
  let depth = 0, cur = '';
  for (const ch of raw) {
    if (ch==='(') { depth++; cur+=ch; }
    else if (ch===')') { depth--; cur+=ch; }
    else if (ch==='-' && depth===0) { parts.push(cur.trim()); cur=''; }
    else cur+=ch;
  }
  if (cur.trim()) parts.push(cur.trim());
  return parts;
}

// Parse a raw weight string. Returns {maxKg, minKg, isPartial} or null.
//
// Formats:
//   "80-100-120"         mainNums=[80,100,120]              isPartial=false
//   "25(6+6)"            mainNums=[25], paren="6+6" (reps)  isPartial=false
//   "20(6 at 25)"        mainNums=[20], attempted=[25]       isPartial=true
//   "20-20-20(6 at 25)"  mainNums=[20,20,20], attempted=[25] isPartial=true
//
// Numbers inside parens are rep counts UNLESS preceded by "at", in which case
// the number after "at" is an attempted weight.
function parseWeights(raw) {
  if (!raw || raw==='done' || raw.trim()==='') return null;

  // Strip everything inside parens to get main weights only
  const mainPart = raw.replace(/\(.*?\)/g, '');
  const mainNums = (mainPart.match(/\d+(?:\.\d+)?/g)||[]).map(Number).filter(n=>n>0);

  // Find all "at X" patterns → attempted weights
  const attempted = [];
  const atRe = /\bat\s+(\d+(?:\.\d+)?)/gi;
  let m;
  while ((m=atRe.exec(raw))!==null) attempted.push(Number(m[1]));

  const allWeights = [...mainNums, ...attempted];
  if (!allWeights.length) return null;

  const isPartial = attempted.length > 0 &&
    Math.max(...attempted) > (mainNums.length ? Math.max(...mainNums) : 0);

  return {
    maxKg: Math.max(...allWeights),
    minKg: mainNums.length ? Math.min(...mainNums) : Math.min(...allWeights),
    isPartial
  };
}

function renderGraphList() {
  const c = document.getElementById('graph-ex-list');
  c.innerHTML = '';
  const q = document.getElementById('graph-search').value.toLowerCase();
  const nameMap = buildNameMap();
  const all = [];
  const seen = new Set();
  Object.values(nameMap).forEach(name => {
    const lc = name.toLowerCase();
    if (seen.has(lc)) return;
    seen.add(lc);
    if (q && !lc.includes(q)) return;
    const count = sessionRows.filter(r => r[3] && r[3].toLowerCase()===lc && !rowExcluded(r)).length;
    all.push({name, count});
  });
  all.sort((a,b)=>a.name.toLowerCase().localeCompare(b.name.toLowerCase())).forEach(x => {
    const div = document.createElement('div');
    div.className = 'graph-ex-item';
    div.innerHTML = `<div><div class="graph-ex-nm">${x.name}</div></div><div style="color:var(--t3);font-size:11px">${x.count} sessions ▶</div>`;
    div.onclick = () => showGraph(x.name);
    c.appendChild(div);
  });
}

function showGraph(exName) {
  document.getElementById('graph-list-view').style.display='none';
  document.getElementById('graph-detail').style.display='block';
  document.getElementById('gd-name').textContent = exName;
  document.getElementById('gd-sub').textContent  = 'Per set · hollow point = attempted weight';

  const entries = getAllEntries(exName);
  const labels  = entries.map(e => fmtDate(e.date));

  const s1vals = entries.map(e => e.s1);
  const s2vals = entries.map(e => e.s2);
  const s3vals = entries.map(e => e.s3);

  const c1='#5bb8f5', c2='#c5f135', c3='#f56b8b';

  function dataset(label, data, col) {
    return {
      label, data,
      borderColor: col,
      backgroundColor: 'transparent',
      fill: false,
      tension: .35,
      pointRadius: 4,
      pointBackgroundColor: entries.map((e,i) => (data[i]!==null && e.isPartial) ? 'transparent' : col),
      pointBorderColor: col,
      pointBorderWidth: 2,
      spanGaps: true,
    };
  }

  if (chartInst) { chartInst.destroy(); chartInst=null; }

  chartInst = new Chart(document.getElementById('main-chart').getContext('2d'), {
    type: 'line',
    data: { labels, datasets: [
      dataset('Set 1', s1vals, c1),
      dataset('Set 2', s2vals, c2),
      dataset('Set 3', s3vals, c3),
    ]},
    options: {
      responsive: true, maintainAspectRatio: false,
      plugins: {
        legend: { display:true, labels:{color:'#888',font:{size:11},boxWidth:16,padding:10} },
        tooltip: {
          mode: 'index', intersect: false,
          callbacks: {
            title: (items) => fmtDate(entries[items[0].dataIndex].date),
            label: (c) => {
              const v = c.parsed.y;
              if (v===null||v===undefined) return null;
              return c.dataset.label+': '+v+' kg'+(entries[c.dataIndex].isPartial?' ◌':'');
            },
            afterBody: (items) => {
              const note = entries[items[0].dataIndex].note;
              return note ? ['','📝 '+note] : [];
            }
          }
        }
      },
      scales: {
        x: { ticks:{color:'#666',font:{size:10},maxRotation:45,maxTicksLimit:8}, grid:{color:'rgba(255,255,255,.05)'} },
        y: { ticks:{color:'#666',font:{size:10}}, grid:{color:'rgba(255,255,255,.05)'} }
      }
    }
  });

  const allVals = [...s1vals,...s2vals,...s3vals].filter(v=>v!==null);
  const lastS3  = s3vals.filter(v=>v!==null);
  const firstS3 = s3vals.find(v=>v!==null);
  const prog = (lastS3.length>1&&firstS3) ? Math.round((lastS3[lastS3.length-1]-firstS3)/firstS3*100) : null;
  document.getElementById('st-max').textContent  = allVals.length ? Math.max(...allVals)+' kg':'—';
  document.getElementById('st-min').textContent  = allVals.length ? Math.min(...allVals)+' kg':'—';
  document.getElementById('st-sess').textContent = entries.length||'—';
  document.getElementById('st-prog').textContent = prog!==null?(prog>0?'+':'')+prog+'% (S3)':'—';
}

// ── NAV ───────────────────────────────────────────────────────────────────────
function switchView(v) {
  curView = v;
  ['log','sessions','graph'].forEach(x=>{
    document.getElementById('view-'+x).style.display  = x===v?'block':'none';
    document.getElementById('nb-'+x).classList.toggle('active', x===v);
  });
  if (v==='sessions') renderSessions();
  if (v==='graph')    { renderGraphList(); switchProgressTab('exercises'); }
}

function switchProgressTab(tab) {
  ['exercises','muscles','load'].forEach(t => {
    document.getElementById('progress-'+t).style.display = t===tab?'block':'none';
    const btn = document.getElementById('ptab-'+t);
    if (btn) btn.classList.toggle('active', t===tab);
  });
  if (tab==='muscles') renderMuscleHeatmap();
  if (tab==='load')    renderLoadHeatmap();
}

// ── MUSCLE HEATMAP ────────────────────────────────────────────────────────────
function renderMuscleHeatmap() {
  const c = document.getElementById('muscle-heatmap');
  if (!c) return;

  if (!muscleGroups.length) {
    c.innerHTML = '<div class="empty-state">Add an <b>exercises</b> tab to your Google Sheet to enable muscle tracking.</div>';
    return;
  }

  // Build weekly data
  function weekKey(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    const day = d.getDay();
    const diff = (day === 0 ? -6 : 1) - day;
    const mon = new Date(d);
    mon.setDate(d.getDate() + diff);
    return mon.toISOString().slice(0,10);
  }

  const weekSet = new Set();
  sessionRows.forEach(r => { if (r[1]) weekSet.add(weekKey(r[1])); });
  // Most recent first
  const weeks = [...weekSet].sort().reverse().slice(0, 8);

  if (!weeks.length) {
    c.innerHTML = '<div class="empty-state">No sessions yet.</div>';
    return;
  }

  const weekData = {};
  weeks.forEach(w => { weekData[w] = new Array(muscleGroups.length).fill(0); });

  sessionRows.forEach(r => {
    if (!r[1] || !r[3] || rowExcluded(r)) return;
    const wk = weekKey(r[1]);
    if (!weekData[wk]) return;
    const m = exMuscleScores(r[3]);
    m.scores.forEach((s,i) => { weekData[wk][i] += s; });
  });

  // Per-group max for independent colour scaling
  const groupMax = muscleGroups.map((_,gi) =>
    Math.max(...weeks.map(w => weekData[w][gi]), 1)
  );

  // Colour: per group, from transparent/dark to the group's recap colour
  // Parse MUSCLE_COLORS hex to RGB for interpolation
  function hexToRgb(hex) {
    const r = parseInt(hex.slice(1,3),16);
    const g = parseInt(hex.slice(3,5),16);
    const b = parseInt(hex.slice(5,7),16);
    return [r,g,b];
  }
  // Background colors for each group (from MUSCLE_COLORS)
  const groupColors = muscleGroups.map((_,i) => {
    const hex = MUSCLE_COLORS[i % MUSCLE_COLORS.length];
    return hexToRgb(hex);
  });

  function cellBg(gi, val) {
    if (val === 0) return 'var(--s2)';
    const intensity = Math.min(1, val / groupMax[gi]);
    const [r,g,b] = groupColors[gi];
    // Fade from near-black (intensity=0) to full colour (intensity=1)
    const ri = Math.round(20 + intensity * (r - 20));
    const gi2 = Math.round(20 + intensity * (g - 20));
    const bi = Math.round(20 + intensity * (b - 20));
    return `rgb(${ri},${gi2},${bi})`;
  }

  function cellText(gi, val) {
    const intensity = val / groupMax[gi];
    return intensity > 0.45 ? '#111' : 'rgba(255,255,255,0.35)';
  }

  function fmtWeek(iso) {
    const d = new Date(iso + 'T12:00:00');
    return d.toLocaleDateString('fr-FR', {day:'numeric', month:'short'});
  }

  // Layout: rows = muscle groups, columns = weeks (most recent left)
  // Each cell shows a filled bar — no number, just colour intensity + tooltip
  const colW = Math.max(32, Math.floor(280 / weeks.length));

  const thead = `<tr>
    <th style="text-align:left;min-width:90px;padding-right:6px;font-size:10px;color:var(--t3);font-weight:400">Group</th>
    ${weeks.map((w,i) => `<th style="font-size:10px;color:${i===0?'var(--t1)':'var(--t3)'};font-weight:${i===0?700:400};width:${colW}px;padding:2px 2px 6px">${i===0?'This week':fmtWeek(w)}</th>`).join('')}
  </tr>`;

  const tbody = muscleGroups.map((g,gi) => {
    const [cr,cg,cb] = groupColors[gi];
    const labelColor = `rgb(${cr},${cg},${cb})`;
    const cells = weeks.map((w,wi) => {
      const val = Math.round(weekData[w][gi]);
      const bg = cellBg(gi, val);
      const tc = cellText(gi, val);
      const pct = val > 0 ? Math.round(val/groupMax[gi]*100) : 0;
      // Show % only if > 0
      const label = pct > 0 ? pct+'%' : '';
      return `<td class="hm-cell" title="${g}: ${val}" style="background:${bg};color:${tc};font-size:9px">${label}</td>`;
    }).join('');
    return `<tr>
      <td class="muscle-lbl" style="color:${labelColor};font-size:11px;font-weight:500">${g}</td>
      ${cells}
    </tr>`;
  }).join('');

  // ── LAST WEEK vs AVERAGE ─────────────────────────────────────────────────────
  // Compare last completed week (weeks[1]) to mean of all other previous weeks
  const lastWeek = weeks[1]; // second most recent = last week
  const avgWeeks = weeks.slice(2);  // all weeks before last week

  let targetHTML = '';
  if (lastWeek) {
    // Mean per group across avgWeeks (only weeks with data for that group)
    const avgVals = muscleGroups.map((_,gi) => {
      const vals = avgWeeks.map(w => weekData[w][gi]).filter(v => v > 0);
      return vals.length ? vals.reduce((a,b)=>a+b,0) / vals.length : 0;
    });

    const lastVals = muscleGroups.map((_,gi) => weekData[lastWeek][gi]);

    // Show ALL groups
    targetHTML = muscleGroups.map((g, gi) => {
      const last = lastVals[gi];
      const avg  = avgVals[gi];
      const [cr,cg,cb] = groupColors[gi];
      const col = `rgb(${cr},${cg},${cb})`;

      // Ratio: last / avg. If no avg, use last/last = 100%
      // Bar: 0% = left edge, 100% = middle, 200%+ = right edge
      // Clamp ratio display to 0–200%
      let ratio = avg > 0 ? last / avg : (last > 0 ? 1 : 0);
      const clampedRatio = Math.min(ratio, 2);

      // Bar is split at midpoint (100%)
      // Left half: 0–100% fills from left to mid proportionally
      // Right half: 100–200% fills from mid to right proportionally
      const barW = 'calc(100% - 90px - 48px - 16px)'; // approx track width

      // Position of filled region:
      // ratio < 1: bar goes from 0 to ratio*50% of total width (left of mid)
      // ratio >= 1: bar goes from 0 to 50% + (ratio-1)*50% of total width
      const fillPct = Math.min(clampedRatio * 50, 100); // 0–100% of full bar width
      const dotPct  = 50; // midpoint dot always at 50%

      // Label
      const pct = Math.round(ratio * 100);
      const label = avg === 0 && last === 0 ? '—' :
                    avg === 0 ? 'new' :
                    pct + '%';
      const labelColor = ratio >= 0.9 ? col : '#f56b8b';

      return `
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <div style="width:90px;font-size:12px;font-weight:500;color:${col};flex-shrink:0">${g}</div>
          <div style="flex:1;position:relative;height:6px;background:var(--s2);border-radius:3px">
            <div style="position:absolute;left:0;top:0;height:6px;width:${fillPct}%;background:${ratio>=0.9?col:'#f56b8b'};border-radius:3px;opacity:0.85"></div>
            <div style="position:absolute;left:${dotPct}%;top:50%;transform:translate(-50%,-50%);width:8px;height:8px;border-radius:50%;background:var(--s1);border:2px solid var(--t3)"></div>
          </div>
          <div style="font-size:11px;font-family:var(--mono);color:${labelColor};width:40px;text-align:right;flex-shrink:0">${label}</div>
        </div>`;
    }).join('');
  }

  // Scale labels
  const scaleLabels = lastWeek ? `
    <div style="display:flex;margin-bottom:8px;padding-left:98px;padding-right:48px">
      <div style="flex:1;font-size:9px;color:var(--t3);text-align:left">0%</div>
      <div style="flex:1;font-size:9px;color:var(--t3);text-align:center">100%</div>
      <div style="flex:1;font-size:9px;color:var(--t3);text-align:right">200%+</div>
    </div>` : '';

  const targetSection = lastWeek ? `
    <div style="border-top:1px solid var(--b1);margin-top:16px;padding-top:14px">
      <div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px">Last week vs. average</div>
      ${scaleLabels}
      ${targetHTML}
    </div>` : '';

  c.innerHTML = `
    <div class="heatmap-card">
      <div class="heatmap-ttl">Muscle stimulus</div>
      <div class="heatmap-sub">Last ${weeks.length} weeks.</div>
      <div style="overflow-x:auto;margin-top:10px">
        <table class="heatmap-table">
          <thead>${thead}</thead>
          <tbody>${tbody}</tbody>
        </table>
      </div>
      ${targetSection}
    </div>`;
}

// ── LOAD HEATMAP ──────────────────────────────────────────────────────────────

// Default reps per set (exercise-specific overrides)
function defaultReps(exName) {
  const lc = (exName||'').toLowerCase().trim();
  if (lc === 'hip raise(8x4)' || lc === 'hip raise') return 8;
  return 12;
}

// Parse load (kg × reps) from a single set string
// Examples:
//   "130"          → 12 × 130 = 1560
//   "130(6+6)"     → 12 × 130 = 1560  (reps in parens = rep split, same weight)
//   "20(6 at 25)"  → 6×20 + 6×25 = 120+150 = 270
//   "done"         → 0
function parseSetLoad(raw, defaultR) {
  if (!raw || raw === 'done' || !raw.trim()) return 0;
  // Take only the number before any bracket (or the whole string if no bracket)
  const s = raw.trim().split('(')[0].trim();
  const w = parseFloat(s);
  if (!isNaN(w) && w > 0) return w * defaultR;
  return 0;
}

// Compute total load for a session row (sum across sets, weighted by muscle scores)
// Returns array of load per muscle group index
function rowMuscleLoad(r) {
  if (!muscleGroups.length) return [];
  const exName = r[3] || '';
  const defReps = defaultReps(exName);
  const sets = rowSets(r);
  const totalLoad = sets.reduce((sum, s) => sum + parseSetLoad(s, defReps), 0);
  const m = exMuscleScores(exName);
  // Distribute load by muscle group score (scores sum to 100)
  return m.scores.map(score => totalLoad * score / 100);
}

function renderLoadHeatmap() {
  const c = document.getElementById('load-heatmap');
  if (!c) return;

  if (!muscleGroups.length) {
    c.innerHTML = '<div class="empty-state">Add an <b>exercises</b> tab to your Google Sheet to enable load tracking.</div>';
    return;
  }

  function weekKey(dateStr) {
    const d = new Date(dateStr + 'T12:00:00');
    const day = d.getDay();
    const diff = (day === 0 ? -6 : 1) - day;
    const mon = new Date(d);
    mon.setDate(d.getDate() + diff);
    return mon.toISOString().slice(0,10);
  }

  const weekSet = new Set();
  sessionRows.forEach(r => { if (r[1]) weekSet.add(weekKey(r[1])); });
  const weeks = [...weekSet].sort().reverse().slice(0, 8);

  if (!weeks.length) {
    c.innerHTML = '<div class="empty-state">No sessions yet.</div>';
    return;
  }

  // Accumulate load per week per muscle group
  const weekData = {};
  weeks.forEach(w => { weekData[w] = new Array(muscleGroups.length).fill(0); });

  sessionRows.forEach(r => {
    if (!r[1] || !r[3] || rowExcluded(r)) return;
    const wk = weekKey(r[1]);
    if (!weekData[wk]) return;
    const loads = rowMuscleLoad(r);
    loads.forEach((v, i) => { weekData[wk][i] += v; });
  });

  // Normalise: lowest non-zero week per group = 100, others proportional
  // If all weeks are 0 for a group, show 0
  const groupMin = muscleGroups.map((_,gi) => {
    const vals = weeks.map(w => weekData[w][gi]).filter(v => v > 0);
    return vals.length ? Math.min(...vals) : 0;
  });
  const groupMax = muscleGroups.map((_,gi) =>
    Math.max(...weeks.map(w => weekData[w][gi]), 1)
  );

  // Colour helpers (reuse same per-group colours)
  function hexToRgb(hex) {
    return [parseInt(hex.slice(1,3),16), parseInt(hex.slice(3,5),16), parseInt(hex.slice(5,7),16)];
  }
  const groupColors = muscleGroups.map((_,i) => hexToRgb(MUSCLE_COLORS[i % MUSCLE_COLORS.length]));

  function cellBg(gi, val) {
    if (val === 0) return 'var(--s2)';
    const intensity = Math.min(1, val / groupMax[gi]);
    const [r,g,b] = groupColors[gi];
    const ri = Math.round(20 + intensity * (r-20));
    const gi2 = Math.round(20 + intensity * (g-20));
    const bi = Math.round(20 + intensity * (b-20));
    return `rgb(${ri},${gi2},${bi})`;
  }
  function cellText(gi, val) {
    return (val / groupMax[gi]) > 0.45 ? '#111' : 'rgba(255,255,255,0.35)';
  }
  function fmtWeek(iso) {
    return new Date(iso+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'});
  }

  const colW = Math.max(32, Math.floor(280 / weeks.length));

  const thead = `<tr>
    <th style="text-align:left;min-width:90px;padding-right:6px;font-size:10px;color:var(--t3);font-weight:400">Group</th>
    ${weeks.map((w,i) => `<th style="font-size:10px;color:${i===0?'var(--t1)':'var(--t3)'};font-weight:${i===0?700:400};width:${colW}px;padding:2px 2px 6px">${i===0?'This week':fmtWeek(w)}</th>`).join('')}
  </tr>`;

  const tbody = muscleGroups.map((g,gi) => {
    const [cr,cg,cb] = groupColors[gi];
    const labelColor = `rgb(${cr},${cg},${cb})`;
    const cells = weeks.map(w => {
      const val = weekData[w][gi];
      const bg  = cellBg(gi, val);
      const tc  = cellText(gi, val);
      // Normalised value: lowest week = 100
      const norm = groupMin[gi] > 0 ? Math.round(val / groupMin[gi] * 100) : 0;
      const label = norm > 0 ? norm : '';
      return `<td class="hm-cell" title="${g}: ${Math.round(val)} kg·reps" style="background:${bg};color:${tc};font-size:9px">${label}</td>`;
    }).join('');
    return `<tr>
      <td class="muscle-lbl" style="color:${labelColor};font-size:11px;font-weight:500">${g}</td>
      ${cells}
    </tr>`;
  }).join('');

  // Last week vs average section (same logic as coverage)
  const lastWeek = weeks[1];
  const avgWeeks = weeks.slice(2);
  let targetSection = '';

  if (lastWeek) {
    const avgVals = muscleGroups.map((_,gi) => {
      const vals = avgWeeks.map(w => weekData[w][gi]).filter(v => v > 0);
      return vals.length ? vals.reduce((a,b)=>a+b,0)/vals.length : 0;
    });
    const lastVals = muscleGroups.map((_,gi) => weekData[lastWeek][gi]);

    const scaleLabels = `
      <div style="display:flex;margin-bottom:8px;padding-left:98px;padding-right:48px">
        <div style="flex:1;font-size:9px;color:var(--t3);text-align:left">0%</div>
        <div style="flex:1;font-size:9px;color:var(--t3);text-align:center">100%</div>
        <div style="flex:1;font-size:9px;color:var(--t3);text-align:right">200%+</div>
      </div>`;

    const bars = muscleGroups.map((g,gi) => {
      const last = lastVals[gi];
      const avg  = avgVals[gi];
      const [cr,cg,cb] = groupColors[gi];
      const col = `rgb(${cr},${cg},${cb})`;
      const ratio = avg > 0 ? last/avg : (last > 0 ? 1 : 0);
      const fillPct = Math.min(ratio * 50, 100);
      const pct = Math.round(ratio * 100);
      const label = avg===0 && last===0 ? '—' : avg===0 ? 'new' : pct+'%';
      const barCol = ratio >= 0.9 ? col : '#f56b8b';
      return `
        <div style="display:flex;align-items:center;gap:8px;margin-bottom:10px">
          <div style="width:90px;font-size:12px;font-weight:500;color:${col};flex-shrink:0">${g}</div>
          <div style="flex:1;position:relative;height:6px;background:var(--s2);border-radius:3px">
            <div style="position:absolute;left:0;top:0;height:6px;width:${fillPct}%;background:${barCol};border-radius:3px;opacity:0.85"></div>
            <div style="position:absolute;left:50%;top:50%;transform:translate(-50%,-50%);width:8px;height:8px;border-radius:50%;background:var(--s1);border:2px solid var(--t3)"></div>
          </div>
          <div style="font-size:11px;font-family:var(--mono);color:${barCol};width:40px;text-align:right;flex-shrink:0">${label}</div>
        </div>`;
    }).join('');

    targetSection = `
      <div style="border-top:1px solid var(--b1);margin-top:16px;padding-top:14px">
        <div style="font-size:10px;color:var(--t3);text-transform:uppercase;letter-spacing:.08em;margin-bottom:12px">Last week vs. average</div>
        ${scaleLabels}${bars}
      </div>`;
  }

  c.innerHTML = `
    <div class="heatmap-card">
      <div class="heatmap-ttl">Training load</div>
      <div class="heatmap-sub">Last ${weeks.length} weeks. Index: lowest week = 100.</div>
      <div style="overflow-x:auto;margin-top:10px">
        <table class="heatmap-table">
          <thead>${thead}</thead>
          <tbody>${tbody}</tbody>
        </table>
      </div>
      ${targetSection}
    </div>`;
}

// ── UTILS ─────────────────────────────────────────────────────────────────────
function eid(s)  { return s.replace(/[^a-zA-Z0-9]/g,'_'); }
function esc(s)  { return s.replace(/"/g,'&quot;'); }
function fmtDate(iso){ return new Date(iso+'T12:00:00').toLocaleDateString('fr-FR',{day:'numeric',month:'short'}); }
function parseMax(raw){ const p = parseWeights(raw); return p ? p.maxKg : null; }
</script>
